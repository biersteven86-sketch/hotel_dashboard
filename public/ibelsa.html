<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hotel Dashboard – ibelsa</title>
  <style>
    body { margin:0; font-family: system-ui, Arial, sans-serif; background: linear-gradient(115deg,#0b4fa6,#1c5fb8,#2a5cc7); color:#fff; padding:20px; }
    header { display:flex; align-items:center; justify-content:space-between; }
    h1 { margin:0; }
    nav a { color:#fff; text-decoration:none; margin-left:15px; }
    main { margin-top:30px; }
    .card { background: rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:16px; margin-bottom:16px; }
    .muted { color:#d2e2ff; }
    .error { color:#ffb3b3; white-space:pre-wrap; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .label { opacity:.8; }
  </style>
</head>
<body>
  <header>
    <h1>Hotel – Dashboard</h1>
    <nav>
      <a href="/ibelsa.html">Übersicht</a>
      <a href="#">Reservierungen</a>
      <a href="#">Zimmer</a>
      <a href="/logout">Abmelden</a>
    </nav>
  </header>

  <main>
    <h2>Willkommen im ibelsa Dashboard</h2>
    <p class="muted">Daten werden live vom Server geladen.</p>

    <section class="card">
      <h3>Hotelinformationen</h3>
      <div id="hotel-info">Lade …</div>
    </section>
  </main>

  <script>
    async function loadHotelInfo() {
      const out = document.getElementById('hotel-info');
      try {
        const res = await fetch('/api/hotel-info', { credentials: 'same-origin' });
        if (!res.ok) throw new Error('HTTP ' + res.status + ' – ' + (await res.text()).slice(0,300));
        const data = await res.json();

        const addr = data.address || {};
        const contact = data.contact_information || {};

        out.innerHTML = `
          <div class="grid">
            <div><span class="label">Name:</span><br><strong>${data.hotel_name || '-'}</strong></div>
            <div><span class="label">Währung:</span><br>${data.currency || '-'}</div>
            <div><span class="label">Adresse:</span><br>${[addr.street, addr.zip, addr.city, addr.country].filter(Boolean).join(', ') || '-'}</div>
            <div><span class="label">Kontakt:</span><br>${[contact.email, contact.phone].filter(Boolean).join(' • ') || '-'}</div>
            <div><span class="label">Slug:</span><br>${data.slug || '-'}</div>
          </div>`;
      } catch (err) {
        out.className = 'error';
        out.textContent = 'Fehler beim Laden der Hotelinformationen:\n' + (err && err.message ? err.message : err);
      }
    }
    document.addEventListener('DOMContentLoaded', loadHotelInfo);
  </script>
</body>
</html>
