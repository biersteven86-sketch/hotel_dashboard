<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="dark light">
  <!-- Assets vorladen -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <style>
    :root{
      --bg:#0b0f14;
      --text:#ffffff;
      --muted:#b7c0d8;
      --accent:#E50914;           /* kräftiges, modernes Rot */
      --border:#23262b;           /* Feldrahmen */
      --card:#0b0b0b;             /* tiefschwarze Login-Box */
      --radius:22px;
      --shadow:0 22px 60px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Arial, "Noto Sans";
      color:var(--text);
      background: #0b0f14 url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{min-height:100%; display:grid; place-items:center; padding:clamp(20px,4vw,60px)}

    /* Tiefschwarze Card */
    .card{
      width:min(520px,92vw);
      background:var(--card);
      border:1px solid #0f0f10;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    /* Logo (PNG) – optional; wenn Datei fehlt, sieht man nur den Titel */
    .brand{
      display:flex; flex-direction:column; align-items:center; gap:12px;
      padding:32px 28px 10px;
      text-align:center;
    }
    .badge{
      width:140px; height:auto; display:block;
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.6));
      user-select:none;
    }
    .brand h1{
      margin:0;
      font-size:32px; font-weight:900; letter-spacing:.4px;
    }

    .content{ padding:18px 26px 24px }
    form{ display:grid; gap:16px }
    label{ font-size:13px; color:var(--muted); margin:0 0 6px }

    /* Felder: tiefschwarze Box, nur dezenter Rahmen, keine weiße Fläche */
    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:48px; padding:0 12px;
      background:#0e0e0e;
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .field input{
      background:transparent; border:0; outline:0; color:var(--text);
      font-size:15px; padding:12px 6px;
    }
    .field button.icon{
      all:unset; cursor:pointer; padding:8px; border-radius:10px; color:#9aa3b2;
    }
    .icon svg{ width:22px; height:22px; display:block }

    /* Autofill neutralisieren (kein Gelb) */
    input:-webkit-autofill{
      -webkit-text-fill-color: var(--text) !important;
      -webkit-box-shadow: 0 0 0px 1000px #0e0e0e inset !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    .caps{ display:none; color:#ef4444; font-size:12px; margin-top:6px }

    /* Link-Zeile */
    .link-row{ display:flex; justify-content:flex-start; margin-top:2px }
    .link-row a{
      font-size:13px; color:var(--accent); text-decoration:none; font-weight:700;
    }
    .link-row a:hover{ text-decoration:underline }

    /* Button in Rot, ohne Neon, dezent schattiert */
    .submit{
      margin-top:6px;
      background:var(--accent);
      color:#fff; border:0; border-radius:16px; padding:14px 18px;
      font-weight:800; font-size:16px; cursor:pointer; letter-spacing:.2px;
      box-shadow: 0 12px 28px rgba(229,9,20,.28);
      transition: transform .08s ease, filter .15s ease;
    }
    .submit:hover{ filter:brightness(1.03) }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{
      text-align:center; color:var(--muted); font-size:12px; padding-top:6px;
    }

    /* Trennlinie + Footer */
    .divider{ height:1px; background:#151515; margin:10px 0 0 }
    .foot{
      text-align:center; color:var(--muted); font-size:12px;
      padding:10px 14px 18px;
    }
    .foot small{ display:block; line-height:1.35 }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="group" aria-labelledby="hd-title">

      <div class="brand">
        <!-- Wenn HD-Logo.png vorhanden ist, wird es angezeigt -->
        <img src="/HD-Logo.png" alt="HD Logo" class="badge" onerror="this.style.display='none'">
        <h1 id="hd-title">Hotel‑Dashboard</h1>
      </div>

      <div class="content">
        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                <!-- geschlossen -->
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                  <line x1="3" y1="3" x2="21" y2="21"/>
                </svg>
                <!-- offen -->
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="caps" id="caps">Warnung: Feststelltaste ist aktiv.</div>
          </div>

          <div class="link-row">
            <a href="/reset">Passwort vergessen?</a>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="divider"></div>
      <div class="foot">
        <small>© 2025 Hotel‑Dashboard</small>
        <small>Powered by MY HOME HOTEL AM ROTTWEIL GMBH</small>
      </div>
    </div>
  </div>

  <script>
    const u=document.getElementById('username'),
          p=document.getElementById('password'),
          s=document.getElementById('submitBtn'),
          tp=document.getElementById('togglePw'),
          eyeOn=document.getElementById('eye-on'),
          eyeOff=document.getElementById('eye-off'),
          caps=document.getElementById('caps');

    const update=()=>{ s.disabled=!(u.value.trim() && p.value.trim()); };
    u.addEventListener('input',update); p.addEventListener('input',update); update();

    tp.addEventListener('click',()=>{
      const show = p.type==="password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });

    ['keydown','keyup'].forEach(ev=>p.addEventListener(ev,e=>{
      try{ caps.style.display=e.getModifierState('CapsLock')?'block':'none'; }catch(_){}
    }));
  </script>
</body>
</html>
