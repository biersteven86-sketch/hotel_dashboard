<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">

  <!-- Assets -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <link rel="preload" as="image" href="/Hotel-Dashboard-Schriftzug.png">

  <style>
    :root{
      /* Farbbasis (sehr dunkles, leicht bläuliches Schwarz) */
      --bg:#06080b;

      /* Panel/Elemente */
      --panel:#0a0d12;           /* Tiefschwarz fürs Login-Panel */
      --panel-edge:#121821;      /* etwas heller für Kanten */
      --stroke:#2a323d;
      --text:#e9edf5;
      --muted:#aeb6c3;

      --accent:#e02724;
      --accent-2:#b31517;

      --radius:22px;

      /* Größen für das Header-Layout */
      --badge:112px;             /* HD-Logo-Größe – hier minimal größer/kleiner justierbar */
      --header-h:150px;          /* reservierter Headerbereich im Panel */
      --wordmark-gap:6px;        /* Abstand Wordmark zum Badge */
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(20px,4vw,60px);
    }

    .card{
      width:min(620px,94vw);
      background:var(--panel);
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        0 28px 60px rgba(0,0,0,.65),
        0 1px 0 rgba(255,255,255,.03) inset;
      position:relative;
      overflow:hidden;
      /* Platz für Badge + Wordmark, ohne dass der Inhalt springt */
      padding: 18px 22px 14px;
      padding-top: calc(var(--header-h) + 18px);
    }

    /* Feine obere Kantenlinie */
    .card::before{
      content:"";
      position:absolute; inset:0;
      /* Glänzend-matter Schimmer über die ganze Fläche */
      background:
        radial-gradient(120% 140% at 8% 4%, rgba(255,255,255,.20) 0%, rgba(255,255,255,.10) 22%, rgba(255,255,255,.03) 46%, rgba(255,255,255,0) 68%),
        linear-gradient(140deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 42%),
        radial-gradient(90% 120% at 100% 100%, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 60%);
      mix-blend-mode:normal;
      pointer-events:none;
    }

    /* Header-Fläche im Panel, in der Badge + Wordmark absolut sitzen */
    .header{
      position:absolute; inset:0 0 auto 0;
      height:var(--header-h);
    }

    /* HD-Badge – absolut, zentriert, über der Kartenkante – verschiebt nichts */
    .hd-badge{
      position:absolute; left:50%;
      top: calc(-0.5 * var(--badge) + 6px); /* steckt halb über der Kante */
      transform:translateX(-50%);
      width:var(--badge); height:auto; display:block;
      filter:
        drop-shadow(0 22px 28px rgba(0,0,0,.55))
        drop-shadow(0 2px 0 rgba(255,255,255,.05));
      pointer-events:none; /* keine Mausfänge */
      z-index:3;
    }

    /* Wordmark-Bild – sitzt „am Badge dran“ */
    .wordmark{
      position:absolute; left:50%;
      top: calc(var(--badge)/2 + var(--wordmark-gap));
      transform:translateX(-50%);
      width:min(82%, 540px); height:auto; display:block;
      filter:
        drop-shadow(0 2px 0 rgba(0,0,0,.55))
        drop-shadow(0 24px 40px rgba(0,0,0,.55));
      z-index:2;
      pointer-events:none;
    }

    .content{ padding:10px 2px 0 }

    .error{
      display:none;
      margin:0 0 12px;
      background:rgba(224,39,36,.12);
      border:1px solid rgba(224,39,36,.45);
      color:#ffd6d6; font-size:13px;
      padding:10px 12px; border-radius:12px;
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:0 0 6px;
    }

    /* Eingabefeld-Wrapper mit Gloss/Glow – KEIN Gelb, kein Autofill-Gelb */
    .field{
      position:relative;
      min-height:52px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#0d1117; /* tiefdunkel, neutral */
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 -18px 42px rgba(0,0,0,.40);
      overflow:hidden;
    }
    .field::before{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(120deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 28% 72%, rgba(255,255,255,.10) 100%),
        radial-gradient(120% 140% at 0% 0%, rgba(255,255,255,.20) 0%, rgba(255,255,255,0) 60%);
      opacity:.65;           /* Stärke des Glanzes */
      pointer-events:none;
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:var(--text);
      font-size:16px;
      padding:13px 14px;
      width:100%;
    }
    /* Autofill neutralisieren (kein Gelb) */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text) !important;
      transition:background-color 9999s ease-in-out 0s;
      box-shadow:0 0 0 1000px transparent inset !important;
    }

    /* Icon-Button im Passwortfeld */
    .field button.icon{
      all:unset; cursor:pointer; border-radius:10px; padding:8px; display:grid; place-items:center;
      color:#c7cfdb; position:absolute; right:6px; top:50%; transform:translateY(-50%);
    }
    .icon svg{ width:22px; height:22px; display:block }

    .row-links{
      display:flex; gap:12px; align-items:center;
      font-size:13px; margin-top:6px;
    }
    .row-links a{
      color:var(--accent); text-decoration:none; font-weight:700;
      border-bottom:1px dashed rgba(255,255,255,.22);
    }
    .row-links a:hover{ color:#fff; border-bottom-color:rgba(255,255,255,.45) }

    /* Button */
    .submit{
      margin-top:12px;
      border:0;
      border-radius:14px;
      padding:14px 18px;
      font-weight:900; font-size:16px;
      color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:
        0 18px 34px rgba(224,39,36,.35),
        0 1px 0 rgba(255,255,255,.06) inset;
      transition:transform .08s ease, box-shadow .12s ease;
    }
    .submit:hover{
      box-shadow:
        0 22px 42px rgba(224,39,36,.42),
        0 1px 0 rgba(255,255,255,.08) inset;
    }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{ text-align:center; margin:12px 0 16px; font-size:13px; color:var(--muted) }

    .foot{
      margin-top:6px;
      padding:14px 6px 18px;
      border-top:1px solid rgba(255,255,255,.06);
      text-align:center; color:var(--muted);
      font-size:13.5px;     /* etwas größer für bessere Lesbarkeit */
      line-height:1.45;
    }
    .foot small{ display:block }

    /* kleine Layout-Kosmetik für schmale Screens */
    @media (max-width:480px){
      :root{ --badge:98px; --header-h:140px; }
      .foot{ font-size:13px }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="group" aria-labelledby="hd-title">

      <!-- absoluter Headerbereich: Badge + Wordmark drücken nichts nach unten -->
      <div class="header" aria-hidden="true">
        <img src="/HD-Logo.png" alt="HD Logo" class="hd-badge">
        <img src="/Hotel-Dashboard-Schriftzug.png" alt="" class="wordmark">
      </div>

      <div class="content">
        <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div style="margin-top:10px">
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                <!-- geschlossen -->
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                  <line x1="3" y1="3" x2="21" y2="21"/>
                </svg>
                <!-- offen -->
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="row-links"><a href="/reset">Passwort vergessen?</a></div>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>
          © <span id="y"></span> Hotel‑Dashboard<br>
          Powered by MY HOME HOTEL AM ROTTWEIL GMBH
        </small>
      </div>
    </div>
  </div>

  <script>
    // Footer-Jahr
    document.getElementById('y').textContent = new Date().getFullYear();

    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');
    const err= document.getElementById('err');

    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });

    if (new URLSearchParams(location.search).get('err')) err.style.display='block';
  </script>
</body>
</html>
