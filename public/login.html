<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>

  <style>
    :root{
      --page:#06080c;
      --panel:rgba(103,103,103,0.92);
      --text:#ffffff;
      --muted:#d5d7da;
      --accent:#e02824;
      --accent-2:#b31618;

      --card-w: 600px;
      --radius:22px;

      --hd:140px;
      --title-w: clamp(320px, 78vw, 580px);
      --logo-gap:0px;   /* Logo und Schriftzug kleben */
      --title-gap:6px;  /* Schriftzug → Formular enger */
    }

    body{
      margin:0; height:100%;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
      color:var(--text);
      background:var(--page) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
      display:grid; place-items:center;
      padding:clamp(18px,4vw,60px);
    }

    .card{
      position:relative;
      width:min(var(--card-w), 94vw);
      background:var(--panel);
      border-radius:var(--radius);
      border:1px solid rgba(0,0,0,.25);
      box-shadow:0 20px 60px rgba(0,0,0,.55);
      padding: clamp(18px,2.6vw,26px);
      padding-top: calc(var(--hd) + var(--title-gap) + 24px);
    }

    .brand-stack{
      position:absolute; left:50%; top:0;
      transform:translate(-50%, calc(-40%));
      display:grid; place-items:center;
      width:min(42vw, 640px);
    }
    .brand-logo{
      width:var(--hd); height:var(--hd);
      display:block; object-fit:contain;
      margin-bottom: var(--logo-gap);
    }
    .brand-wordmark{
      width:var(--title-w);
      margin-top:-4px; /* Schriftzug an Logo anschmiegen */
      display:block;
    }

    .title-spacer{ height: var(--title-gap); }

    .content{ display:grid; gap:12px; }

    label{
      font-size:13px;
      color:#fff;
      font-weight:600;
      margin:0 0 4px;
    }

    /* Felder NUR mit Umrandung */
    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:48px; padding:0 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.55);
      background:transparent;
    }
    .field:focus-within{
      border-color:#fff;
      box-shadow:0 0 0 1px #fff;
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:#fff;
      font-size:16px;
      padding:10px 8px;
      width:100%;
    }
    .field input::placeholder{ color:rgba(255,255,255,.6); }
    .field button.icon{
      all:unset; cursor:pointer; padding:6px; display:grid; place-items:center;
      color:#c7cfdb;
    }
    .icon svg{ width:22px; height:22px; }

    /* Autofill neutralisieren */
    input:-webkit-autofill{
      -webkit-text-fill-color:#fff !important;
      box-shadow:0 0 0 1000px transparent inset !important;
    }

    .submit{
      margin-top:10px;
      border:0; border-radius:12px; padding:14px 18px;
      font-weight:900; font-size:16px; color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
    }
    .submit:disabled{ opacity:.6; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-stack">
      <img class="brand-logo" src="/HD-Logo.png" alt="HD Logo">
      <img class="brand-wordmark" src="/Hotel-Dashboard-Schriftzug.png" alt="Hotel-Dashboard">
    </div>

    <div class="title-spacer"></div>

    <div class="content">
      <form action="/login" method="POST" id="loginForm" novalidate>
        <div>
          <label for="username">Benutzername</label>
          <div class="field">
            <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
          </div>
        </div>

        <div>
          <label for="password">Passwort</label>
          <div class="field">
            <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
              <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                <line x1="3" y1="3" x2="21" y2="21"/>
              </svg>
              <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>
      </form>
    </div>
  </div>

  <script>
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');

    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });
  </script>
</body>
</html>
