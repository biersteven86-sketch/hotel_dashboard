<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="dark light">
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <style>
    :root{
      --bg:#0b0f14;
      --glass:rgba(255,255,255,.06);
      --glass-strong:rgba(255,255,255,.10);
      --stroke:rgba(255,255,255,.18);
      --text:#e9eef7;
      --muted:#aab3c5;
      --matt:#0f1114;
      --matt-2:#0b0d10;
      --accent:#d51f26;        /* kräftiges, edles Rot (nicht Neon) */
      --accent-grad:#b8151b;   /* dunkleres Rot für Verlauf */
      --shadow:0 20px 60px rgba(0,0,0,.55);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      /* HINTERGRUND – unverändert */
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }
    body::before{
      /* dezentes Vignette/Glow wie im Mock */
      content:""; position:fixed; inset:0; pointer-events:none; 
      background:
        radial-gradient(900px 500px at 80% 10%, rgba(255,0,0,.12), transparent 60%),
        linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,.55));
    }

    .wrap{min-height:100%; display:grid; place-items:center; padding:clamp(20px,4vw,60px)}
    .card{
      width:min(520px,92vw);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      position:relative;
      overflow:visible;
    }

    /* Schwebendes HD-Logo (PNG) */
    .badge{
      position:absolute;
      left:50%; transform:translate(-50%,-58%);
      width:140px; height:auto;
      filter: drop-shadow(0 24px 28px rgba(0,0,0,.6));
      user-select:none; pointer-events:none;
    }

    /* Header */
    .brand{padding:62px 28px 0; text-align:center}
    .brand h1{
      margin:0;
      font-size:34px;
      font-weight:900;
      letter-spacing:.4px;
      text-shadow:0 2px 0 rgba(0,0,0,.45);
    }

    .content{ padding:20px 26px 26px }
    form{ display:grid; gap:16px }

    label{ font-size:13px; color:var(--muted); display:block; margin:0 0 6px }

    /* Felder: keine weiße Fläche, nur matt-dunkler Rahmen */
    .field{
      border-radius:14px; display:flex; align-items:center; 
      padding:12px 14px;
      background:rgba(0,0,0,.15);                 /* semitransparent, kein Weiß */
      border:1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 2px 10px rgba(0,0,0,.18);
    }
    .field input{
      flex:1; background:transparent; border:0; outline:0;
      color:var(--text); font-size:15px; padding:4px 2px;
    }
    .field button.icon{
      all:unset; cursor:pointer; padding:6px 8px; border-radius:10px; color:var(--muted);
    }
    /* echte geschlossen/offen-Augen */
    .eye{display:none}
    .eye.on{display:inline}

    /* Chrome Autofill Gelb neutralisieren */
    input:-webkit-autofill{
      -webkit-text-fill-color: var(--text);
      -webkit-box-shadow: 0 0 0px 1000px rgba(255,255,255,0) inset !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    .caps{ display:none; color:#ef4444; font-size:12px }

    .link-row{
      display:flex; justify-content:flex-start; align-items:center;
      margin-top:2px;
    }
    .link-row a{ 
      font-size:13px; color:var(--accent); text-decoration:none;
    }
    .link-row a:hover{ text-decoration:underline }

    .submit{
      margin-top:8px; 
      background:linear-gradient(180deg, var(--accent), var(--accent-grad));
      color:#fff; border:0; border-radius:16px; padding:14px 18px;
      font-weight:800; font-size:16px; cursor:pointer; letter-spacing:.2px;
      box-shadow: 0 14px 28px rgba(213,31,38,.35), inset 0 -2px 0 rgba(0,0,0,.25);
      transition:transform .08s ease, filter .15s ease;
    }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .help{
      text-align:center; color:var(--muted); font-size:12px; padding-top:4px;
    }

    .foot{
      text-align:center; color:var(--muted); font-size:11px; padding:8px 10px 18px;
    }
    .foot small{ display:block; line-height:1.4 }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <!-- Schwebendes Logo -->
      <img class="badge" src="/HD-Logo.png" alt="HD Logo">

      <div class="brand">
        <h1>Hotel‑Dashboard</h1>
      </div>

      <div class="content">
        <form action="/login" method="POST" id="loginForm" autocomplete="on">
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen">
                <!-- geschlossen -->
                <svg class="eye eye-off on" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 3l18 18M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.59M9.88 4.24A9.77 9.77 0 0 1 12 4c5 0 9 4 10 8- .33 1.33-1.02 2.55-1.98 3.61M6.1 6.1C4.1 7.5 2.76 9.46 2 12c1 4 5 8 10 8 1.03 0 2.03-.17 2.97-.48"/>
                </svg>
                <!-- offen -->
                <svg class="eye eye-on" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="caps" id="caps">Warnung: Feststelltaste ist aktiv.</div>
          </div>

          <div class="link-row">
            <a href="/reset">Passwort vergessen?</a>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>© 2025 Hotel‑Dashboard</small>
        <small>Powered by MY HOME HOTEL AM
