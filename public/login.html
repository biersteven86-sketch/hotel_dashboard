<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">
  <style>
    :root{
      --bg:#0b1020;
      --glass:rgba(255,255,255,.10);
      --glass-strong:rgba(255,255,255,.18);
      --stroke:rgba(255,255,255,.25);
      --text:#eef2ff;
      --muted:#b7c0d8;
      --accent:#e60023;        /* kräftiges Rot */
      --shadow:0 10px 30px rgba(0,0,0,.45);
      --radius:18px;
      --matt:#0d0d0d;          /* matt schwarz */
    }
    body{
      margin:0;
      height:100%;
      display:grid; place-items:center;
      background:linear-gradient(180deg,#0b1020,#0a0f1c);
      color:var(--text);
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
    }
    .card{
      width:min(440px,92vw);
      border-radius:24px;
      background:linear-gradient(180deg,var(--glass),rgba(255,255,255,.06));
      backdrop-filter:blur(18px);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .brand{display:flex; align-items:center; gap:18px; padding:26px 24px 10px}
    .logo-box{
      width:72px; height:72px;
      border-radius:18px;
      background:var(--matt);
      border:3px solid #000;      /* Umrandung matt schwarz */
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:28px; color:#fff;
    }
    .brand-text h1{ margin:0; font-size:26px; font-weight:800; letter-spacing:.3px }

    .content{ padding:20px 24px 24px }
    form{ display:grid; gap:14px }
    label{ font-size:13px; color:var(--muted); margin-bottom:6px }
    .field{ background:var(--glass-strong); border:1px solid var(--stroke);
      border-radius:14px; display:flex; align-items:center; padding:10px 12px }
    .field input{ flex:1; background:transparent; border:0; outline:0; color:var(--text); font-size:15px; }
    .field button.icon{ all:unset; cursor:pointer; padding:6px 8px; border-radius:10px }
    .caps{ display:none; color:var(--accent); font-size:12px }
    .error{ display:none; background:rgba(239,68,68,.14); border:1px solid rgba(239,68,68,.45); color:#fecaca; padding:10px 12px; border-radius:12px; font-size:13px }

    .submit{ margin-top:6px; background:linear-gradient(135deg,var(--accent),#ff3355);
      color:#fff; border:0; border-radius:14px; padding:12px 16px; font-weight:800; font-size:15px; cursor:pointer;
      box-shadow:0 10px 24px rgba(230,0,35,.35); transition:transform .08s ease }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }
    .submit:active{ transform:translateY(1px) scale(.997) }

    .foot{ text-align:center; color:var(--muted); font-size:12px; padding:12px 18px 18px }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo-box">HD</div>
      <div class="brand-text">
        <h1>Hotel-Dashboard</h1>
      </div>
    </div>

    <div class="content">
      <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>
      <form action="/login" method="POST" id="loginForm" autocomplete="on" novalidate>
        <div>
          <label for="username">Benutzername</label>
          <div class="field">
            <input id="username" name="username" type="text" placeholder="z. B. admin" required />
          </div>
        </div>
        <div>
          <label for="password">Passwort</label>
          <div class="field">
            <input id="password" name="password" type="password" placeholder="••••••••" required />
            <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">🙈</button>
          </div>
          <div class="caps" id="caps">Warnung: Feststelltaste ist aktiv.</div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:13px; margin-top:4px">
          <a class="muted" href="/reset">Passwort vergessen?</a>
          <span>Bei Problemen bitte an den Administrator wenden.</span>
        </div>
        <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>
      </form>
    </div>

    <div class="foot">
      <small>© <span id="y"></span> Hotel-Dashboard<br>
      Powered by MY HOME Hotel am Rottweil GmbH</small>
    </div>
  </div>

<script>
  document.getElementById('y').textContent = new Date().getFullYear();
  const u=document.getElementById('username'),
        p=document.getElementById('password'),
        s=document.getElementById('submitBtn'),
        tp=document.getElementById('togglePw'),
        c=document.getElementById('caps'),
        err=document.getElementById('err');

  const update=()=>{ s.disabled=!(u.value.trim() && p.value); };
  u.addEventListener('input',update); p.addEventListener('input',update); update();

  // Passwort Toggle: 🙈 → 👁️
  tp.addEventListener('click',()=>{
    if(p.type==="password"){ p.type="text"; tp.textContent="👁️"; }
    else{ p.type="password"; tp.textContent="🙈"; }
    p.focus();
  });

  ['keydown','keyup'].forEach(ev=>p.addEventListener(ev,e=>{
    try{ c.style.display=e.getModifierState('CapsLock')?'block':'none'; }catch(_){}
  }));

  if (new URLSearchParams(location.search).get('err')==='1') {
    err.style.display='block';
  }
</script>
</body>
</html>
