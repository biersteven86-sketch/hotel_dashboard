<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="light dark" />

  <!-- Assets vorladen -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/Hotel-Dashboard-mit-Schriftzug.png">

  <style>
    /* ===========================================================
       STELLSCHRAUBEN – hier drehst du, ohne dass Layout „wandert“
       =========================================================== */
    :root{
      /* Hintergrund */
      --page-bg: #0a0d11;

      /* Karte (Panel) – schmal & tiefschwarz/seidenmatt */
      --card-max-w: 720px;     /* SCHMALER machen: z.B. 640px */
      --card-radius: 20px;
      --card-fill: #0d1015;    /* tiefes Graphit, nicht hart #000 */
      --card-stroke: #242a33;
      --card-shadow: 0 30px 80px rgba(0,0,0,.65);

      /* Seidenmatt-Glanz übers ganze Panel (kein Spot nur oben links) */
      --gloss-strength: .12;   /* .08 – .18 praxisnah */
      --gloss-falloff: 70%;    /* Verlaufslänge */

      /* Kombiniertes PNG (HD + Schriftzug) */
      --hero-width: 520px;     /* Breite des Kombi‑Bildes */
      --hero-overlap: 18px;    /* wie tief es in die Karte „einsteht“ */

      /* Abstände unter dem Kombi‑Bild */
      --section-gap: 22px;     /* Abstand Bild → Formular */

      /* Eingabefelder */
      --field-radius: 12px;
      --field-stroke: #323a46;
      --field-bg: rgba(255,255,255,.02);

      /* Farben */
      --text: #e9edf5;
      --muted: #a7b1c0;

      /* Button‑Rot (dein Ton) */
      --red-1: #e02724;
      --red-2: #b31517;
      --btn-shadow: 0 18px 34px rgba(224,39,36,.36);
    }

    *{ box-sizing:border-box }
    html,body{ height:100% }
    body{
      margin:0; color:var(--text);
      font:16px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      background: var(--page-bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    /* Bühne zentriert */
    .stage{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(14px,3.2vw,36px);
    }

    /* Stack: Hero-Bild (HD+Titel) + Karte sind zusammengekoppelt,
       dadurch verschiebt sich nichts mehr relativ. */
    .stack{
      position:relative;
      width:min(var(--card-max-w), 92vw);
    }

    /* Kombiniertes PNG – zentriert über der Karte, fix überlappt */
    .hero{
      position:absolute;
      left:50%; transform:translateX(-50%);
      width:min(var(--hero-width), 88vw);
      height:auto;
      top: calc(-1 * var(--hero-overlap));   /* Unterkante der Wabe „fasst“ die Kartenoberkante */
      z-index:3;
      pointer-events:none; user-select:none;
      filter: drop-shadow(0 12px 16px rgba(0,0,0,.55));
    }

    /* Karte selbst */
    .card{
      position:relative;
      border-radius:var(--card-radius);
      background:var(--card-fill);
      border:1px solid var(--card-stroke);
      box-shadow:var(--card-shadow);
      overflow:hidden;               /* keine hellen Ecken mehr */
      isolation:isolate;             /* eigener Kontext für Glanz */
    }

    /* Seidenmatt‑Glanz über gesamte Fläche (gleichmäßig) */
    .card::before{
      content:"";
      position:absolute; inset:0;
      border-radius:inherit;
      pointer-events:none;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,var(--gloss-strength)) 0%,
          rgba(255,255,255,calc(var(--gloss-strength)*.35)) var(--gloss-falloff),
          rgba(255,255,255,0) 100%);
      mix-blend-mode: screen;
      z-index:0;
    }

    /* Innenleben – wir reservieren Platz unter dem Hero-Bild */
    .inner{
      position:relative; z-index:1;
      padding: clamp(18px,2.4vw,24px);
      padding-top: calc(var(--section-gap) + 40px); /* Luft unterm Schriftzug */
    }

    /* Labels & Felder */
    label{
      display:block; font-size:13px; color:var(--muted);
      margin:0 0 6px;
    }
    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:52px; padding:0 12px;
      border-radius:var(--field-radius);
      border:1px solid var(--field-stroke);
      background:var(--field-bg);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    .field input{
      width:100%; background:transparent; border:0; outline:0;
      color:var(--text); font-size:16px; padding:12px 8px;
    }

    /* Autofill (gelb) neutralisieren */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text) !important;
      transition: background-color 9999s ease-out 0s;
      box-shadow: 0 0 0 1000px transparent inset !important;
      caret-color: var(--text);
    }

    .icon-btn{ all:unset; cursor:pointer; display:grid; place-items:center; padding:10px; border-radius:10px; color:#c8cfdb }
    .icon-btn svg{ width:22px; height:22px; display:block }

    .row{ display:flex; gap:12px; font-size:13px; margin-top:10px }
    .row a{ color:var(--red-1); text-decoration:none; font-weight:700; border-bottom:1px dashed rgba(255,255,255,.22) }
    .row a:hover{ color:#fff; border-bottom-color:rgba(255,255,255,.45) }

    .submit{
      margin-top:12px; border:0; border-radius:14px; padding:14px 18px;
      font-weight:900; font-size:16px; color:#fff; cursor:pointer;
      background: linear-gradient(180deg,var(--red-1),var(--red-2));
      box-shadow: var(--btn-shadow), 0 1px 0 rgba(255,255,255,.06) inset;
      transition: transform .08s, box-shadow .12s, filter .12s;
    }
    .submit:hover{ box-shadow: 0 22px 44px rgba(224,39,36,.46), 0 1px 0 rgba(255,255,255,.08) inset; filter:saturate(1.05) }
    .submit:active{ transform:translateY(1px) scale(.998) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .foot{
      margin-top:10px; padding:14px 20px 18px;
      border-top:1px solid rgba(255,255,255,.06);
      text-align:center; color:var(--muted); font-size:12px;
    }
    .foot small{ display:block; line-height:1.35 }

    .error{
      display:none; background:rgba(224,39,36,.12);
      border:1px solid rgba(224,39,36,.45);
      color:#ffd8d8; padding:10px 12px; border-radius:12px; font-size:13px; margin:0 0 10px;
    }
    .caps{ display:none; color:#ef5555; font-size:12px; margin-top:6px }

    /* Handy: Panel & Hero automatisch kleiner */
    @media (max-width: 520px){
      :root{
        --card-max-w: 94vw;
        --hero-width: 88vw;
        --section-gap: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="stack" role="group" aria-labelledby="hd-title">
      <!-- Kombiniertes PNG: HD‑Badge + Schriftzug -->
      <img src="/Hotel-Dashboard-mit-Schriftzug.png" alt="Hotel‑Dashboard" class="hero" id="hd-title"/>

      <!-- Karte -->
      <div class="card">
        <div class="inner">
          <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

          <form action="/login" method="POST" id="loginForm" novalidate>
            <div class="block">
              <label for="username">Benutzername</label>
              <div class="field">
                <input id="username" name="username" type="text"
                       placeholder="z. B. admin" autocomplete="username" required />
              </div>
            </div>

            <div class="block" style="margin-top:12px">
              <label for="password">Passwort</label>
              <div class="field">
                <input id="password" name="password" type="password"
                       placeholder="••••••••" autocomplete="current-password" required />
                <button class="icon-btn" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                  <!-- geschlossen -->
                  <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                    <line x1="3" y1="3" x2="21" y2="21"/>
                  </svg>
                  <!-- offen -->
                  <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <div class="caps" id="caps">Warnung: Feststelltaste ist aktiv.</div>
            </div>

            <div class="row" style="margin-top:10px">
              <a href="/reset">Passwort vergessen?</a>
            </div>

            <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

            <div class="foot">
              <small>
                © <span id="y"></span> Hotel‑Dashboard<br>
                Powered by MY HOME HOTEL AM ROTTWEIL GMBH
              </small>
            </div>
          </form>
        </div>
      </div>
    </div> <!-- /.stack -->
  </div>   <!-- /.stage -->

  <script>
    // Footer-Jahr
    document.getElementById('y').textContent = new Date().getFullYear();

    // Interaktion
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');
    const caps  = document.getElementById('caps');
    const err= document.getElementById('err');

    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });

    ['keydown','keyup'].forEach(ev => p.addEventListener(ev, e => {
      try { caps.style.display = e.getModifierState('CapsLock') ? 'block' : 'none'; } catch(_){}
    }));

    // Fehlermeldung via ?err=1
    if (new URLSearchParams(location.search).get('err')) err.style.display='block';
  </script>
</body>
</html>
