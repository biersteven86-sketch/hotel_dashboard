<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <style>
    :root{
      --bg:#0b1020;
      --glass:rgba(255,255,255,.10);
      --glass-strong:rgba(255,255,255,.14);
      --stroke:rgba(255,255,255,.22);
      --text:#eef2ff;
      --muted:#b7c0d8;
      --accent:#ef4444;     /* Verlauf 1 */
      --accent-2:#7c5cff;   /* Verlauf 2 */
      --logo-red:#e11d2e;   /* kräftig, modern, nicht neon */
      --logo-black:#0a0a0a; /* matte Kontur */
      --shadow:0 10px 30px rgba(0,0,0,.45);
      --radius:18px;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(124,92,255,.20), transparent 60%),
        radial-gradient(1200px 600px at 90% 90%, rgba(56,189,248,.18), transparent 60%),
        linear-gradient(to bottom right, rgba(0,0,0,.25), rgba(0,0,0,.35));
    }
    .wrap{min-height:100%; display:grid; grid-template-rows:1fr auto; gap:24px; place-items:center; padding:clamp(20px,4vw,60px)}
    .card{
      width:min(420px,92vw);
      border-radius:var(--radius);
      background:linear-gradient(180deg,var(--glass),rgba(255,255,255,.06));
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    /* Branding */
    .brand{display:flex; align-items:center; gap:16px; padding:24px 22px 10px; justify-content:center}
    .logo-box{
      width:78px; height:78px; border-radius:16px;
      display:grid; place-items:center; flex-shrink:0;
      background:linear-gradient(135deg, rgba(255,255,255,.08), rgba(0,0,0,.12));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.12),
        0 10px 30px rgba(0,0,0,.45);
      position:relative;
    }
    .logo-box .hd{
      font-weight:900; font-size:30px; letter-spacing:.5px;
      color:var(--logo-red);
      -webkit-text-stroke: 2px var(--logo-black); /* matte Kontur */
      text-shadow: 0 2px 6px rgba(0,0,0,.35);
      line-height:1;
      user-select:none;
    }
    .brand-text{ text-align:left }
    .brand-text h1{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:.5px;
    }
    .brand-text p{
      margin:4px 0 0;
      font-size:13px;
      color:var(--muted);
    }

    .content{ padding:20px 22px 24px }
    form{ display:grid; gap:14px }
    label{ font-size:13px; color:var(--muted); display:block; margin:0 0 6px }
    /* Einheitliches graues „Glas“, keine weiße Fläche */
    .field{
      background:var(--glass-strong);
      border:1px solid var(--stroke);
      border-radius:14px; display:flex; align-items:center; padding:10px 12px
    }
    .field input{
      flex:1; background:transparent; border:0; outline:0; color:var(--text);
      font-size:15px; padding:6px 2px
    }
    .field button.icon{
      all:unset; cursor:pointer; padding:6px 8px; border-radius:10px;
      display:grid; place-items:center
    }
    .icon svg{ width:20px; height:20px; display:block }
    .row{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:4px }
    .row .left{ display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px }
    .row .links{ display:flex; gap:8px; align-items:center; flex-wrap:wrap }
    .row .links a{ font-size:13px; color:var(--muted); text-decoration:none; border-bottom:1px dashed rgba(255,255,255,.25) }
    .row .links a:hover{ color:var(--text); border-bottom-color:rgba(255,255,255,.45) }
    .sep{ opacity:.35; }
    .caps{ display:none; color:#fecaca; background:rgba(239,68,68,.14); border:1px solid rgba(239,68,68,.35); padding:8px 10px; border-radius:10px; font-size:12px; margin-top:6px }
    .error{ display:none; background:rgba(239,68,68,.14); border:1px solid rgba(239,68,68,.45); color:#fecaca; padding:10px 12px; border-radius:12px; font-size:13px; margin-bottom:6px }
    .submit{
      margin-top:6px; background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff; border:0; border-radius:14px; padding:12px 16px; font-weight:700; font-size:15px; cursor:pointer;
      box-shadow:0 10px 24px rgba(124,92,255,.35); transition:transform .08s ease
    }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }
    .submit:active{ transform:translateY(1px) scale(.997) }

    /* Footer außerhalb der Karte, ganz unten */
    .foot{
      text-align:center; color:var(--muted); font-size:12px; padding:6px 10px 0;
      width:100%;
    }
    .foot small{ display:block; opacity:.9 }

    a.muted{ color:var(--muted); text-decoration:none; border-bottom:1px dashed rgba(255,255,255,.25) }
    a.muted:hover{ color:var(--text); border-bottom-color:rgba(255,255,255,.45) }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="logo-box" aria-hidden="true">
          <div class="hd">HD</div>
        </div>
        <div class="brand-text">
          <h1>Hotel-Dashboard</h1>
          <p>Bitte anmelden</p>
        </div>
      </div>

      <div class="content">
        <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>
        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>
          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen">
                <!-- standard: geschlossenes Auge -->
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M10.58 10.58A3 3 0 0012 15a3 3 0 002.42-4.42M9.88 5.54A10.94 10.94 0 0112 5c5.52 0 9.8 4.48 10 6- .09.46-1.41 2.77-3.84 4.6M6.18 6.18C3.77 7.99 2.58 10.18 2 11c.2 1 4.48 6 10 6 1.07 0 2.1-.16 3.06-.46" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none">
                  <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z" stroke="currentColor" stroke-width="2" fill="none"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
              </button>
            </div>
            <div class="caps" id="caps">Warnung: Feststelltaste ist aktiv.</div>
          </div>

          <div class="row">
            <div class="left">
              <!-- „Angemeldet bleiben“ vorerst deaktiviert -->
              <input type="checkbox" id="remember" disabled>
              <label for="remember">Angemeldet bleiben</label>
            </div>
            <div class="links">
              <a href="/forgot" id="forgot">Passwort vergessen?</a>
              <span class="sep">·</span>
              <a href="mailto:admin@hotel-dashboard.de">Probleme? Admin kontaktieren</a>
            </div>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>
        </form>
      </div>
    </div>

    <div class="foot">
      <small>© <span id="y"></span> Hotel-Dashboard</small>
    </div>
  </div>

<script>
  // Jahr
  document.getElementById('y').textContent = new Date().getFullYear();

  const u  = document.getElementById('username');
  const p  = document.getElementById('password');
  const s  = document.getElementById('submitBtn');
  const tp = document.getElementById('togglePw');
  const c  = document.getElementById('caps');
  const eyeOn  = document.getElementById('eye-on');
  const eyeOff = document.getElementById('eye-off');

  // Submit aktivieren, wenn beide Felder befüllt sind
  const update=()=>{ s.disabled = !(u.value.trim() && p.value.trim()); };
  u.addEventListener('input',update); p.addEventListener('input',update); update();

  // Passwort-Visibility + Icon wechseln
  tp.addEventListener('click',()=>{
    const show = p.type === "password";
    p.type = show ? "text" : "password";
    eyeOn.style.display  = show ? "block" : "none";
    eyeOff.style.display = show ? "none"  : "block";
    tp.setAttribute('aria-label', show ? 'Passwort verbergen' : 'Passwort anzeigen');
  });

  // Caps-Lock Hinweis
  ['keydown','keyup'].forEach(ev=>p.addEventListener(ev,e=>{
    try{ c.style.display = e.getModifierState && e.getModifierState('CapsLock') ? 'block' : 'none'; }catch(_){}
  }));

  // Option: serverseitige Fehler anzeigen, falls ?err=1
  if (new URLSearchParams(location.search).get('err')) {
    const err = document.getElementById('err');
    if (err) err.style.display = 'block';
  }
</script>
</body>
</html>
