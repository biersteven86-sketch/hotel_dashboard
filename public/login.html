<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">
  <!-- Pfad muss exakt zum vorhandenen Dateinamen passen -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <style>
    :root{
      /* Farben */
      --text:#eef2ff;
      --muted:#b7c0d8;
      --accent:#e11d48; /* kräftiges Rot für Aktionen/Links */
      --accent-2:#7c5cff; /* bleibt ungenutzt, falls später nötig */
      --stroke:rgba(255,255,255,.18);

      /* Layout */
      --radius:18px;
      --shadow:0 14px 40px rgba(0,0,0,.55);

      /* Schwarzer Karten-Hintergrund (mattes Schwarz) */
      --card:#0a0a0a;
      --field:#121212;   /* Felder dunkel, nicht transparent, kein Gelb */
      --field-stroke:#262626;
      --field-focus:#3f3f46;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);

      /* Nur das Bild. Keine Overlays/Gradients/Glas. */
      background:#000 url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(20px,4vw,60px);
    }

    .card{
      width:min(420px,92vw);
      border-radius:var(--radius);
      background:var(--card);               /* tiefschwarz, kein Glas */
      border:1px solid var(--field-stroke); /* matte, dezente Kante */
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    /* Branding */
    .brand{display:flex; align-items:center; gap:16px; padding:22px 22px 8px}
    .logo-box{
      width:72px; height:72px; border-radius:16px;
      background:#0a0a0a;                  /* passend zur Karte */
      border:1px solid #1f1f1f;            /* matte Umrandung */
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; flex-shrink:0;
    }
    .logo-box img{width:100%; height:100%; object-fit:cover}

    .brand-text h1{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:.5px;
    }

    /* Inhalt */
    .content{ padding:18px 22px 22px }
    form{ display:grid; gap:14px }

    label{ font-size:13px; color:var(--muted); display:block; margin:0 0 6px }

    .field{
      background:var(--field);              /* dunkel, NICHT transparent */
      border:1px solid var(--field-stroke);
      border-radius:14px;
      display:flex; align-items:center; gap:8px;
      padding:10px 12px;
      transition:border-color .15s ease, box-shadow .15s ease;
    }
    .field:focus-within{
      border-color:var(--field-focus);
      box-shadow:0 0 0 2px var(--field-focus) inset;
    }
    .field input{
      flex:1; background:transparent; border:0; outline:0;
      color:var(--text); font-size:15px; padding:6px 2px;
    }

    /* Autofill-Gelb neutralisieren (Chrome/Safari) */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color: var(--text);
      -webkit-box-shadow: 0 0 0px 1000px var(--field) inset;
      transition: background-color 5000s ease-in-out 0s;
      caret-color: var(--text);
    }

    .icon-btn{
      all:unset; cursor:pointer; padding:6px 8px; border-radius:10px;
      line-height:1;
    }

    .row{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:4px }
    .row .left{ display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px }

    .caps{ display:none; color:#ef4444; font-size:12px }

    .error{
      display:none;
      background:rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.35);
      color:#fecaca;
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      margin-bottom:8px;
    }

    .actions{
      display:flex; justify-content:space-between; align-items:center; margin-top:6px;
    }

    .link{
      color:var(--accent); font-size:13px; text-decoration:none; border-bottom:1px dashed rgba(255,255,255,.25);
    }
    .link:hover{ border-bottom-color:rgba(255,255,255,.5) }

    .submit{
      margin-top:8px;
      background:var(--accent);
      color:#fff; border:0; border-radius:14px;
      padding:12px 16px; font-weight:700; font-size:15px; cursor:pointer;
      box-shadow:0 10px 24px rgba(225,29,72,.35); transition:transform .08s ease, opacity .2s ease;
    }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }
    .submit:active{ transform:translateY(1px) scale(.997) }

    .help{ margin-top:10px; font-size:13px; color:var(--muted); }

    .foot{
      text-align:center; color:var(--muted); font-size:12px;
      padding:10px 18px 16px;
      border-top:1px solid var(--field-stroke);
      background:var(--card);
    }

    /* Kleinigkeiten für sehr kleine Breiten */
    @media (max-width:360px){
      .brand-text h1{ font-size:20px }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="region" aria-label="Login">
      <div class="brand">
        <!-- Dein HD-Logo als PNG (Datei liegt neben dem Hintergrund) -->
        <div class="logo-box">
          <img src="/HD-LOGO.png" alt="HD-Logo">
        </div>
        <div class="brand-text">
          <h1>Hotel‑Dashboard</h1>
        </div>
      </div>

      <div class="content">
        <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

        <form action="/login" method="POST" id="loginForm" autocomplete="on">
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" required />
              <!-- Auge: geschlossen bei Passwort, offen bei Text -->
              <button class="icon-btn" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">🙈</button>
            </div>
            <div class="caps" id="caps">Warnung: Feststelltaste ist aktiv.</div>
          </div>

          <div class="actions">
            <a class="link" href="/forgot">Passwort vergessen?</a>
            <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>
          </div>

          <div class="help">
            Bei Problemen wenden Sie sich an den Administrator.
          </div>
        </form>
      </div>

      <div class="foot">
        <small>© <span id="y"></span> Hotel‑Dashboard · powered by MyHomeHotel am Rottweil GmbH</small>
      </div>
    </div>
  </div>

<script>
  // Jahr
  document.getElementById('y').textContent = new Date().getFullYear();

  // Elemente
  const u = document.getElementById('username');
  const p = document.getElementById('password');
  const s = document.getElementById('submitBtn');
  const tp = document.getElementById('togglePw');
  const c = document.getElementById('caps');

  // Submit-Enable wenn beide Felder befüllt
  const update = () => { s.disabled = !(u.value && p.value); };
  u.addEventListener('input', update);
  p.addEventListener('input', update);
  update();

  // Auge toggeln (🙈 geschlossen bei "password", 👁️ offen bei "text")
  const updateEye = () => { tp.textContent = (p.type === 'password') ? '🙈' : '👁️'; };
  tp.addEventListener('click', () => { p.type = (p.type === 'password') ? 'text' : 'password'; updateEye(); });
  updateEye();

  // Caps-Lock Hinweis
  ['keydown','keyup'].forEach(ev => p.addEventListener(ev, e => {
    try { c.style.display = e.getModifierState('CapsLock') ? 'block' : 'none'; } catch(_){}
  }));
</script>
</body>
</html>
