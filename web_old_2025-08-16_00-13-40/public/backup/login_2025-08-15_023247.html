<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hotel – Dashboard • Login</title>
  <style>
    :root{
      /* Basisfarben (blau + lila/pink wie zuvor) */
      --bg1:#0b4fa6; --bg2:#1c5fb8; --bg3:#2a5cc7;
      --violet:#6a4cff; --pink:#ff4fb5;
      --card-top:rgba(255,255,255,.22); --card-bot:rgba(0,0,0,.14);
      --stroke:rgba(255,255,255,.35);
      --muted:#d2e2ff; --white:#fff;
      --field:#eef5ff; --fieldText:#21354b;
      --green1:#2ecc71; --green2:#27ae60;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--white);
      /* Starker, mehrfarbiger Hintergrund */
      background:
        radial-gradient(70% 120% at 80% 10%, rgba(255,79,181,.30) 0%, rgba(255,79,181,0) 55%),
        radial-gradient(90% 110% at 10% 85%, rgba(106,76,255,.28) 0%, rgba(106,76,255,0) 60%),
        radial-gradient(60% 100% at 50% 0%, rgba(255,255,255,.12) 0%, rgba(255,255,255,0) 55%),
        linear-gradient(115deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      background-size: 120% 120%, 140% 140%, 100% 100%, 100% 100%;
      animation: bgShift 24s ease-in-out infinite alternate;
      display:grid; place-items:center; padding:36px;
      position:relative; overflow:hidden;
    }
    /* weiche Lichtkegel-Animation oben drüber */
    body::before{
      content:"";
      position:absolute; inset:-20%;
      background:
        radial-gradient(35% 25% at 30% 25%, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 70%),
        radial-gradient(30% 22% at 70% 30%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 70%),
        radial-gradient(40% 28% at 50% 70%, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 75%);
      filter: blur(6px);
      animation: lightDrift 22s ease-in-out infinite alternate;
      pointer-events:none;
    }
    @keyframes bgShift {
      0%   {background-position: 0% 50%, 100% 50%, 50% 0%, 0% 0%;}
      100% {background-position: 100% 50%,   0% 50%, 50% 0%, 0% 0%;}
    }
    @keyframes lightDrift{
      0%   {transform: translate3d(-2%, -1%, 0) scale(1.0);}
      100% {transform: translate3d( 2%,  1%, 0) scale(1.05);}
    }

    /* Karte kompakt wie dein Lieblings‑Layout */
    .card{
      width:min(520px, 92vw);
      border-radius:18px;
      background: linear-gradient(180deg, var(--card-top), var(--card-bot));
      border:1px solid var(--stroke);
      box-shadow: 0 14px 44px rgba(0,0,0,.32);
      padding:26px 22px 20px;
      backdrop-filter: blur(2px);
    }
    .brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
    .brand .logo{
      width:24px; height:24px; border-radius:4px; background:#d30707;
      display:grid; place-items:center;
      box-shadow: 0 2px 6px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.35);
      font-weight:800; font-size:12px; letter-spacing:.4px;
    }
    .brand .logo span{color:#fff; transform:translateY(1px)}
    .brand .by{font-size:12px; color:var(--muted); opacity:.9}

    .title{
      margin:0 0 6px; text-align:center; font-weight:800;
      font-size: clamp(28px, 4.2vw, 36px); line-height:1.08;
      text-shadow:0 1px 0 rgba(0,0,0,.25);
    }
    .subtitle{
      text-align:center; margin:0 0 18px; color:var(--muted);
      font-size: clamp(13px, 2vw, 15px);
    }

    .form{display:grid; gap:12px}
    .label{display:block; margin:2px 6px 6px; font-size: clamp(13px, 1.8vw, 14px)}
    .input{
      width:100%; height: clamp(42px, 5.5vw, 48px);
      border-radius:12px; border:1px solid var(--stroke);
      background:var(--field); color:var(--fieldText);
      padding:0 14px; font-size: clamp(15px, 2.1vw, 16px);
      box-shadow: inset 0 2px 6px rgba(0,0,0,.06);
    }
    .btn{
      margin-top:4px; width:100%; height: clamp(44px, 6vw, 50px);
      border-radius:14px; border:0; cursor:pointer; font-weight:800; color:#fff;
      font-size: clamp(15px, 2.1vw, 16px);
      background: linear-gradient(180deg, var(--green1), var(--green2));
      box-shadow: 0 10px 22px rgba(39,174,96,.35), inset 0 1px 0 rgba(255,255,255,.35);
    }
    .footer{margin-top:12px; text-align:center; font-size:12px; color:var(--muted)}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo"><span>MH</span></div>
      <div class="by">Powered by My Home Hotel Lam, Rottweil</div>
    </div>

    <h1 class="title">Hotel – Dashboard</h1>
    <p class="subtitle">Anmelden – bitte Zugangsdaten eingeben.</p>

    <form class="form" method="POST" action="/login" autocomplete="on">
      <div>
        <label class="label" for="u">Benutzername</label>
        <input id="u" name="username" class="input" type="text" placeholder="Benutzername" required />
      </div>
      <div>
        <label class="label" for="p">Passwort</label>
        <input id="p" name="password" class="input" type="password" placeholder="Passwort" required />
      </div>
      <button class="btn" type="submit">Login</button>
    </form>

    <div class="footer">© 2025 Hotel – Dashboard</div>
  </div>
</body>
</html>
