<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel-Dashboard Login</title>
  <style>
    body{
      margin:0; padding:0; height:100vh;
      display:flex; justify-content:center; align-items:center;
      font-family:Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(106,17,203,.7), rgba(37,117,252,.7)),
        url('/hotel-dashboard-bg.jpg');
      background-size:cover; background-position:center;
    }
    .login-container{
      background:rgba(255,255,255,.9);
      padding:2rem; width:300px; border-radius:12px;
      box-shadow:0 8px 16px rgba(0,0,0,.3); text-align:center;
    }
    .login-container h2{ margin-bottom:1.5rem; color:#333; }
    .login-container input{
      width:100%; padding:.75rem; margin-bottom:1rem;
      border:1px solid #ccc; border-radius:8px; font-size:1rem;
    }
    .login-container button{
      width:100%; padding:.75rem; border:none; border-radius:8px;
      background:#2575fc; color:#fff; font-size:1rem; cursor:pointer;
    }
    .login-container button:hover{ background:#1a5ed6; }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form method="POST" action="/login">
      <input type="text" name="username" placeholder="Benutzername" required>
      <input type="password" name="password" placeholder="Passwort" required>
      <button type="submit">Anmelden</button>
    </form>
  </div>
</body>
</html>
