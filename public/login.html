<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <style>
    :root{
      --bg:#0b1020;
      --glass:rgba(255,255,255,.10);
      --glass-strong:rgba(255,255,255,.18);
      --stroke:rgba(255,255,255,.25);
      --text:#eef2ff;
      --muted:#b7c0d8;
      --accent:#22c55e;   /* Grün für Login-Button */
      --accent-2:#16a34a;
      --shadow:0 10px 30px rgba(0,0,0,.45);
      --radius:18px;
      --focus:0 0 0 3px rgba(34,197,94,.45);
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      /* Fallback-Farbe immer sichtbar, auch wenn das Bild fehlt */
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }
    /* Farbiges Overlay – unabhängig vom Bild, sorgt dafür, dass es NIE „weiß“ ist */
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(124,92,255,.18), transparent 60%),
        radial-gradient(1200px 600px at 90% 90%, rgba(56,189,248,.16), transparent 60%),
        linear-gradient(to bottom right, rgba(0,0,0,.25), rgba(0,0,0,.35));
    }
    .wrap{min-height:100%; display:grid; place-items:center; padding:clamp(20px,4vw,60px)}
    .card{
      width:min(460px,92vw);
      border-radius:24px;
      background:linear-gradient(180deg,var(--glass),rgba(255,255,255,.06));
      -webkit-backdrop-filter:blur(16px);
      backdrop-filter:blur(16px);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .card::after{content:""; position:absolute; inset:0; border-radius:24px;
      box-shadow:0 0 0 1px rgba(255,255,255,.18) inset; pointer-events:none}

    /* Branding */
    .brand{display:flex; align-items:center; gap:16px; padding:24px 22px 10px}
    .logo-box{
      width:72px; height:72px; border-radius:16px;
      background:linear-gradient(135deg,#ef4444,#7c5cff);
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:28px; color:#fff;
      text-shadow:0 2px 6px rgba(0,0,0,.4);
      box-shadow:0 6px 16px rgba(239,68,68,.45), inset 0 0 12px rgba(255,255,255,.2);
      flex-shrink:0;
    }
    .brand-text h1{margin:0; font-size:28px; font-weight:800; letter-spacing:.3px}
    .brand-text p{margin:6px 0 0; font-size:13px; color:var(--muted)}

    .content{ padding:18px 22px 22px }
    form{ display:grid; gap:14px }
    label{ font-size:13px; color:var(--muted); display:block; margin:0 0 6px }
    .field{ background:rgba(255,255,255,.92); border:1px solid rgba(15,23,42,.15);
      border-radius:12px; display:flex; align-items:center; padding:10px 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.2), inset 0 -1px 0 rgba(0,0,0,.06), 0 6px 14px rgba(2,6,23,.12) }
    .field:focus-within{ box-shadow:var(--focus), inset 0 1px 0 rgba(255,255,255,.2), inset 0 -1px 0 rgba(0,0,0,.06), 0 6px 14px rgba(2,6,23,.12) }
    .field input{ flex:1; background:transparent; border:0; outline:0; color:#0f172a; font-size:15px; padding:6px 2px }
    .field button.icon{ all:unset; cursor:pointer; padding:6px 8px; border-radius:10px }

    .caps{ display:none; color:#fecaca; background:rgba(239,68,68,.14); border:1px solid rgba(239,68,68,.45);
      padding:8px 10px; border-radius:10px; font-size:12px; margin-top:6px }
    .error{ display:none; background:rgba(239,68,68,.14); border:1px solid rgba(239,68,68,.45); color:#fecaca; padding:10px 12px; border-radius:12px; font-size:13px }

    .submit{ margin-top:8px; background:linear-gradient(180deg,var(--accent),var(--accent-2));
      color:#fff; border:0; border-radius:12px; padding:12px 16px; font-weight:800; font-size:15px; cursor:pointer;
      box-shadow:0 12px 28px rgba(22,163,74,.35); transition:transform .08s ease, filter .15s ease }
    .submit:disabled{ opacity:.65; cursor:not-allowed; box-shadow:none; filter:saturate(.7) }
    .submit:active{ transform:translateY(1px) scale(.997) }

    .foot{ text-align:center; color:var(--muted); font-size:12px; padding:10px 18px 18px }
    a.muted{ color:var(--muted); text-decoration:none; border-bottom:1px dashed rgba(255,255,255,.25) }
    a.muted:hover{ color:var(--text); border-bottom-color:rgba(255,255,255,.45) }

    @media (prefers-reduced-motion: reduce){ .submit{ transition:none } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="region" aria-labelledby="title">
      <div class="brand">
        <div class="logo-box" aria-hidden="true">HD</div>
        <div class="brand-text">
          <h1 id="title">Hotel‑Dashboard</h1>
          <p>Bitte anmelden</p>
        </div>
      </div>

      <div class="content">
        <div class="error" id="err" role="alert">Anmeldung fehlgeschlagen. Bitte prüfen.</div>
        <form action="/login" method="POST" id="loginForm" autocomplete="on" novalidate>
          <!-- optional: CSRF <input type="hidden" name="_csrf" value="{{csrfToken}}"> -->

          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text"
                     placeholder="Benutzername" required
                     autocomplete="username" autocapitalize="none" inputmode="text" autofocus />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password"
                     placeholder="Passwort" required autocomplete="current-password" />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort ein-/ausblenden">👁️</button>
            </div>
            <div class="caps" id="caps" aria-live="polite">Warnung: Feststelltaste ist aktiv.</div>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Login</button>
        </form>
      </div>

      <div class="foot">
        <small>© <span id="y"></span> Hotel‑Dashboard · <a class="muted" href="/status">Status</a></small>
      </div>
    </div>
  </div>

  <noscript style="position:fixed;left:0;right:0;bottom:0;background:#111;color:#fff;padding:10px 14px;text-align:center;font:14px system-ui">
    JavaScript ist deaktiviert – das Formular funktioniert trotzdem, aber ohne Komfortfunktionen.
  </noscript>

<script>
  // Jahr
  document.getElementById('y').textContent = new Date().getFullYear();

  // Elemente
  const u  = document.getElementById('username');
  const p  = document.getElementById('password');
  const s  = document.getElementById('submitBtn');
  const tp = document.getElementById('togglePw');
  const c  = document.getElementById('caps');
  const err= document.getElementById('err');

  // Fehleranzeige via ?err=1 / ?error=1
  (function(){
    try {
      const q = new URLSearchParams(location.search);
      if (q.has('err') || q.has('error')) err.style.display = 'block';
    } catch(_) {}
  })();

  // Button-Enable
  function update(){ s.disabled = !(u.value.trim() && p.value.trim()); }
  u.addEventListener('input', update);
  p.addEventListener('input', update);
  window.addEventListener('pageshow', update);
  update();

  // Passwort anzeigen/ausblenden
  tp.addEventListener('click', () => {
    const isPw = p.type === 'password';
    p.type = isPw ? 'text' : 'password';
    tp.setAttribute('aria-pressed', String(isPw));
  });

  // Caps-Lock Hinweis
  ['keydown','keyup'].forEach(ev => p.addEventListener(ev, e => {
    try { c.style.display = e.getModifierState('CapsLock') ? 'block' : 'none'; } catch(_){}
  }));

  // Enter auf Username → Fokus Passwort
  u.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && u.value.trim()) { e.preventDefault(); p.focus(); }
  });
</script>
</body>
</html>
