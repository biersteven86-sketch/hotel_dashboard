<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="light dark">

  <!-- Assets -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <link rel="preload" as="image" href="/Hotel-Dashboard-Schriftzug.png">

  <style>
    :root{
      /* Look & Farben */
      --page:#06080c;
      --text:#eef2f8;
      --muted:#cfd6de;
      --accent:#e02824;     /* Rot für Button & Link */
      --accent-2:#b31618;

      /* Panel-Glas (dein Swatch #676767) */
      --panel-r:103; --panel-g:103; --panel-b:103;
      --panel-alpha:.28;
      --panel-border:rgba(255,255,255,.10);

      /* Größen */
      --card-w: 640px;
      --radius:22px;

      /* Brand-Stack */
      --hd:108px;            /* etwas größer als vorher */
      --word-overlap:-10px;  /* NEGATIVER Wert = dichter zusammen */
      --title-w: clamp(300px, 78%, 540px);
      --title-gap:8px;       /* Schriftzug ↔ Formular */
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--page) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(18px,4vw,60px);
    }

    /* ===== Karte (Glas) ===== */
    .card{
      position:relative;
      width:min(var(--card-w), 94vw);
      border-radius:var(--radius);
      background: rgba(var(--panel-r),var(--panel-g),var(--panel-b),var(--panel-alpha));
      backdrop-filter: blur(8px) saturate(120%);
      -webkit-backdrop-filter: blur(8px) saturate(120%);
      border:1px solid var(--panel-border);
      box-shadow:
        0 26px 70px rgba(0,0,0,.68),
        0 1px 0 rgba(255,255,255,.05) inset;
      padding: clamp(18px,2.2vw,24px);
      /* Platz für Logos oben einkalkulieren */
      padding-top: calc(var(--hd) * .70 + var(--title-gap) + 14px);
      overflow: visible;
    }
    .card::after{
      content:"";
      position:absolute; inset:0 0 auto 0; height:1px; pointer-events:none;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }

    /* ===== Logo-Stack ===== */
    .brand-stack{
      position:absolute; left:50%; top:0;
      /* minimal weiter runter (Logo saß zu hoch) */
      transform:translate(-50%, calc(-45% + 2px));
      display:grid; place-items:center;
      pointer-events:none; z-index:5;
      width:min(32vw, 520px);
    }
    .brand-stack .hd{
      width:var(--hd); height:var(--hd); object-fit:contain; display:block;
      filter:
        drop-shadow(0 22px 38px rgba(0,0,0,.55))
        drop-shadow(0 1px 0 rgba(255,255,255,.08));
    }
    .brand-stack .wordmark{
      /* dichter an das HD-Logo rücken */
      margin-top: var(--word-overlap);
      width:var(--title-w); height:auto; display:block;
      filter:
        drop-shadow(0 1px 0 rgba(255,255,255,.10))
        drop-shadow(0 16px 26px rgba(0,0,0,.50));
    }

    /* Spacer verhindert Kollision mit Schriftzug */
    .title-spacer{ height: var(--title-gap); }

    /* ===== Formular ===== */
    .content{ display:grid; gap:10px; }

    label{
      display:block;
      font-size:14.5px;          /* etwas größer */
      color:#fff;
      margin:0 0 4px;
      letter-spacing:.2px;
    }

    /* Nur Umrandung, keine Fläche */
    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:48px; padding:0 12px;
      border-radius:14px;
      background: transparent;
      border:1.2px solid rgba(255,255,255,.25);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 10px 26px rgba(0,0,0,.40);
      transition: box-shadow .15s ease, border-color .15s ease;
    }
    /* Fokus-Ring beibehalten, aber dezenter und wärmer */
    .field:focus-within{
      border-color: rgba(255,255,255,.42);
      box-shadow:
        0 0 0 2px rgba(224,40,36,.14),
        0 12px 28px rgba(0,0,0,.55);
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:#fff;
      font-size:16.5px;          /* etwas größer */
      padding:10px 8px;
      width:100%;
      caret-color:#fff;
    }
    .field input::placeholder{ color:rgba(255,255,255,.90); }

    .field button.icon{
      all:unset; cursor:pointer; border-radius:10px; padding:8px; display:grid; place-items:center;
      color:#c7cfdb;
    }
    .icon svg{ width:22px; height:22px; display:block }

    /* Autofill (Gelb) neutralisieren */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color:#fff !important;
      transition:background-color 9999s ease-in-out 0s;
      box-shadow:0 0 0 1000px transparent inset !important;
      caret-color:#fff !important;
      filter:none !important;
    }

    .error{
      display:none;
      background:rgba(224,39,36,.12);
      border:1px solid rgba(224,39,36,.45);
      color:#ffd6d6;
      padding:10px 12px; border-radius:12px; font-size:13px; margin:0 0 8px;
    }

    .row-links{ display:flex; gap:12px; font-size:15px; margin-top:2px }
    .row-links a{
      /* Rot, ohne gepunktete Unterlinie */
      color:var(--accent);
      font-weight:800;
      text-decoration:none;
      border:0;
    }
    .row-links a:hover{
      color:#fff;
      text-decoration:underline;
      text-underline-offset:2px;
    }

    /* Anmelden-Button: ohne „Leuchten“ */
    .submit{
      margin-top:8px;
      border:0; border-radius:14px; padding:12px 18px;
      font-weight:900; font-size:16.5px; color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:none;                   /* <- Leuchten entfernt */
      transition:transform .08s ease, box-shadow .12s ease, filter .12s ease;
    }
    .submit:hover{
      filter: brightness(1.06);
    }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{
      text-align:center; margin:8px 0 10px;
      font-size:14px;                  /* besser lesbar */
      color:var(--muted);
      letter-spacing:.2px;
    }

    .foot{
      margin-top:6px;
      padding:12px 6px 6px;
      border-top:1px solid rgba(255,255,255,.10);
      text-align:center; color:#dce3ea;
      font-size:13.5px; line-height:1.5;  /* besser lesbar ohne Karte zu vergrößern */
      letter-spacing:.2px;
    }
    .foot small{ display:block }

    /* Mobile Tweaks */
    @media (max-width:560px){
      :root{
        --hd:100px;
        --title-w: 86%;
        --word-overlap:-8px;
        --title-gap:10px;
      }
      .card{ padding-top: calc(var(--hd) * .72 + var(--title-gap) + 12px); }
      .row-links{ font-size:14.5px }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="group" aria-labelledby="hd-title">
      <!-- Feste Markenebene -->
      <div class="brand-stack" aria-hidden="true">
        <img class="hd" src="/HD-Logo.png" alt="HD">
        <img class="wordmark" src="/Hotel-Dashboard-Schriftzug.png" alt="Hotel‑Dashboard" id="hd-title">
      </div>

      <!-- Abstand, damit das Formular nicht unter den Schriftzug rutscht -->
      <div class="title-spacer" aria-hidden="true"></div>

      <div class="content">
        <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                <!-- geschlossen -->
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                  <line x1="3" y1="3" x2="21" y2="21"/>
                </svg>
                <!-- offen -->
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row-links">
            <a href="/reset">Passwort vergessen?</a>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>
          © <span id="y"></span> Hotel‑Dashboard<br>
          Powered by HOTEL LAMM‑ROTTWEIL GMBH
        </small>
      </div>
    </div>
  </div>

  <script>
    // © Jahr
    document.getElementById('y').textContent = new Date().getFullYear();

    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');
    const err= document.getElementById('err');

    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });

    if (new URLSearchParams(location.search).get('err')) err.style.display='block';
  </script>
</body>
</html>
