<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="light dark">
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <link rel="preload" as="image" href="/Hotel-Dashboard-Schriftzug.png">
  <style>
    :root{
      /* Grundlook */
      --page:#080b10;           /* Seitenhintergrund */
      --panel:#0b0f14;          /* Kartenfläche (tiefschwarz, neutral) */
      --panel-edge:#141a22;
      --text:#eef2f7;
      --muted:#b7c0cc;
      --stroke:#2a323d;
      --accent:#e02724;
      --accent-2:#b31517;
      --radius:22px;

      /* Steuerwerte – hier kannst du später feinjustieren */
      --card-w: min(680px, 94vw);
      --badge: 116px;           /* HD‑Logo-Größe (bei Bedarf auf 112/120 ändern) */
      --stack-gap: 14px;        /* vertikale Abstände im Formular */
      --title-w: clamp(300px, 78%, 540px); /* Breite des Schriftzug‑PNGs */
      --title-gap: 8px;         /* Abstand Wordmark zur Badge */
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--page) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(20px,4vw,60px);
    }

    /* ==== Karte ======================================================== */
    .card{
      width:var(--card-w);
      background:var(--panel);
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.05);
      position:relative;
      overflow:hidden;
      box-shadow:
        0 30px 80px rgba(0,0,0,.7),
        0 1px 0 rgba(255,255,255,.04) inset;
      /* Platz im oberen Bereich für unseren Logo-Stack einplanen */
      padding-top: calc(var(--badge) + 42px); /* Badge + Wordmark + etwas Luft */
    }

    /* Glänzend‑matt über die GESAMTE Fläche (verschiebt nichts) */
    .card::before{
      content:"";
      position:absolute; inset:0; pointer-events:none;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,.22) 0%,
          rgba(255,255,255,.10) 30%,
          rgba(255,255,255,.04) 55%,
          rgba(255,255,255,.02) 78%,
          rgba(0,0,0,.25) 100%),
        radial-gradient(120% 100% at 50% 0%,
          rgba(255,255,255,.08), transparent 60%),
        radial-gradient(120% 100% at 50% 100%,
          rgba(0,0,0,.35), transparent 55%);
      mix-blend-mode:screen;
      opacity:.75;
    }
    /* leichte „gebürstete“ Körnung */
    .card::after{
      content:"";
      position:absolute; inset:0; pointer-events:none;
      background-image:
        repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 1px, rgba(0,0,0,0) 1px 3px),
        repeating-linear-gradient(0deg,  rgba(255,255,255,.008) 0 1px, rgba(0,0,0,0) 1px 3px);
      opacity:.32;
    }

    /* ==== Logo-Stack (HD + Wordmark) – FIXIERT & unabhängig vom Formular == */
    .logo-stack{
      position:absolute; left:0; right:0; top:0;
      transform:translateY(calc(-.5 * var(--badge))); /* Badge halb über der Kante */
      display:grid; place-items:center;
      z-index:2; pointer-events:none;
    }
    .hd{
      width:var(--badge); height:var(--badge); object-fit:contain; display:block;
      filter: drop-shadow(0 24px 28px rgba(0,0,0,.55))
              drop-shadow(0 2px 0 rgba(255,255,255,.06));
    }
    .wordmark{
      margin-top:var(--title-gap);
      width:var(--title-w); height:auto; display:block;
      filter:
        drop-shadow(0 1px 0 rgba(255,255,255,.65))
        drop-shadow(0 14px 22px rgba(0,0,0,.55));
    }

    /* ==== Inhalt / Formular ========================================== */
    .content{
      padding: 10px 22px 0;
      display:grid; gap:var(--stack-gap);
      position:relative; z-index:1;
    }

    .error{
      display:none;
      background:rgba(224,39,36,.12);
      border:1px solid rgba(224,39,36,.45);
      color:#ffd6d6;
      padding:10px 12px; border-radius:12px; font-size:13px; margin:0;
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:0 0 6px;
    }

    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:50px; padding:0 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,.55),
        0 1px 0 rgba(255,255,255,.04);
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:var(--text);
      font-size:16px;
      padding:12px 8px;
      width:100%;
    }
    /* Autofill konsequent neutralisieren */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text) !important;
      box-shadow:0 0 0 1000px transparent inset !important;
      transition:background-color 9999s ease-in-out 0s;
      caret-color:var(--text) !important;
    }

    .field button.icon{
      all:unset; cursor:pointer; border-radius:10px; padding:8px; display:grid; place-items:center;
      color:#c7cfdb;
    }
    .icon svg{ width:22px; height:22px; display:block }

    .row-links{ display:flex; gap:12px; font-size:13px; margin-top:2px }
    .row-links a{
      color:var(--accent); text-decoration:none; font-weight:700;
      border-bottom:1px dashed rgba(255,255,255,.22);
    }
    .row-links a:hover{ color:#fff; border-bottom-color:rgba(255,255,255,.45) }

    .submit{
      margin-top:6px;
      border:0; border-radius:14px; padding:14px 18px;
      font-weight:900; font-size:16px; color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:
        0 12px 24px rgba(224,39,36,.28),
        0 1px 0 rgba(255,255,255,.06) inset;
      transition:transform .08s ease, box-shadow .12s ease;
    }
    .submit:hover{
      box-shadow:
        0 16px 30px rgba(224,39,36,.34),
        0 1px 0 rgba(255,255,255,.08) inset;
    }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{ text-align:center; margin:10px 0 12px; font-size:13px; color:var(--muted) }

    /* Fußbereich etwas größer/lesbarer */
    .foot{
      margin-top:10px;
      padding:16px 20px 22px;
      border-top:1px solid rgba(255,255,255,.06);
      text-align:center; color:var(--muted);
      font-size:13.5px; line-height:1.5;
    }
    .foot small{ display:block }

    /* Mobile Tweaks */
    @media (max-width:520px){
      :root{ --badge: 104px; --title-gap: 6px; }
      .content{ padding:10px 16px 0 }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="group" aria-labelledby="hd-title">

      <!-- Fester Logo-Stack: verschiebt NICHTS im Formular -->
      <div class="logo-stack" aria-hidden="true">
        <img class="hd" src="/HD-Logo.png" alt="HD">
        <img class="wordmark" src="/Hotel-Dashboard-Schriftzug.png" alt="Hotel‑Dashboard" id="hd-title">
      </div>

      <div class="content">
        <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                  <line x1="3" y1="3" x2="21" y2="21"/>
                </svg>
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row-links">
            <a href="/reset">Passwort vergessen?</a>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>

          <div class="foot">
            <small>
              © <span id="y"></span> Hotel‑Dashboard<br>
              Powered by MY HOME HOTEL AM ROTTWEIL GMBH
            </small>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Footer-Jahr
    document.getElementById('y').textContent = new Date().getFullYear();

    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');
    const err    = document.getElementById('err');

    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });

    if (new URLSearchParams(location.search).get('err')) err.style.display='block';
  </script>
</body>
</html>
