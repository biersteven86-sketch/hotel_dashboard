<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">

  <!-- Assets -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <link rel="preload" as="image" href="/Hotel-Dashboard-Schriftzug.png">

  <style>
    :root{
      /* Grundtöne (tiefschwarz, wie besprochen) */
      --text:#e9edf5;
      --muted:#a2abba;
      --accent:#e02724;
      --accent-2:#b31517;
      --stroke:#44474d;
      --radius:24px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background: #0a0d12 url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(20px,4vw,60px);
    }

    /* ===== Panel (tiefschwarz + kräftig glänzend-matt) ===== */
    .card{
      width:min(680px,94vw);
      border-radius:var(--radius);
      overflow:hidden;                 /* schneidet Glow/Überstände sauber ab */
      position:relative;
      padding-top:58px;                /* Platz unter dem schwebenden Badge */
      background:linear-gradient(180deg,#111216 0%,#0b0c0e 100%);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        0 28px 60px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.04),
        inset 0 -1px 0 rgba(0,0,0,.25);
    }
    /* großflächiger Glanz + matte Körnung */
    .card::before{
      content:"";
      position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(170% 240% at 50% -20%,
          rgba(255,255,255,.32) 0%,
          rgba(255,255,255,.18) 35%,
          rgba(255,255,255,.08) 70%,
          rgba(255,255,255,0) 100%
        ),
        linear-gradient(135deg,
          rgba(255,255,255,.18) 0%,
          rgba(255,255,255,.08) 45%,
          rgba(255,255,255,0) 85%
        ),
        url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'>\
  <filter id='n'>\
    <feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='4' stitchTiles='stitch'/>\
    <feColorMatrix type='saturate' values='0'/>\
  </filter>\
  <rect width='100%' height='100%' filter='url(%23n)' opacity='0.12'/>\
</svg>");
      background-blend-mode: screen, screen, overlay;
      mix-blend-mode: screen;
      opacity:.55;
    }
    /* feine, gefräste Toplinie */
    .card::after{
      content:"";
      position:absolute; inset:0 0 auto 0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      pointer-events:none;
    }

    /* ===== Schwebendes HD-Badge (übergreifend) ===== */
    .badge{
      position:absolute;
      left:50%; top:0;
      transform:translate(-50%,-38%);
      width:96px; height:96px;
      display:grid; place-items:center;
      z-index:2; pointer-events:none;
    }
    .badge::before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(60% 60% at 50% 65%, rgba(0,0,0,.55), rgba(0,0,0,.85)),
        conic-gradient(from 0deg, #1b1e22 0 120deg, #0e1012 120deg 240deg, #1b1e22 240deg 360deg);
      clip-path:polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        0 14px 28px rgba(0,0,0,.55),
        0 2px 0 rgba(255,255,255,.06) inset,
        0 -2px 0 rgba(0,0,0,.35) inset;
      border-radius:12px; /* weiche Kanten */
    }
    .badge::after{
      /* roter Under-Glow/Keil */
      content:"";
      position:absolute; inset:auto 22px -12px 22px; height:18px;
      background:linear-gradient(180deg,#de2c29,#8f1719);
      filter:blur(6px); opacity:.55; border-radius:999px;
    }
    .badge .txt{
      position:relative; z-index:1;
      font-weight:900; font-size:28px; letter-spacing:.5px;
      color:#e9edf5;
      text-shadow:
        0 1px 0 rgba(255,255,255,.22),
        0 10px 24px rgba(0,0,0,.65);
      user-select:none;
    }

    /* ===== Header mit Wortmarke (PNG) ===== */
    .brand{
      display:flex; align-items:center; justify-content:center;
      padding:22px 24px 8px;
      gap:14px;
    }
    .wordmark{
      display:block;
      height:42px;            /* Höhe des Schriftzugs fein anpassbar */
      max-width:90%;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,.14)) drop-shadow(0 8px 18px rgba(0,0,0,.6));
    }
    .title{ display:none }    /* alten Texttitel vollständig entfernen */

    .content{ padding:16px 28px 0 }
    label{ display:block; font-size:13px; color:var(--muted); margin:0 0 6px }

    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:54px; padding:0 12px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.06));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04), inset 0 -1px 0 rgba(0,0,0,.22);
    }
    .field input{
      background:transparent; border:0; outline:0; color:var(--text);
      font-size:16px; padding:14px 8px; width:100%;
    }
    .field button.icon{
      all:unset; cursor:pointer; border-radius:10px; padding:8px; display:grid; place-items:center; color:#c7cfdb;
    }
    .icon svg{ width:22px; height:22px; display:block }

    /* Autofill neutral halten */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text) !important;
      box-shadow:0 0 0 1000px transparent inset !important;
      transition:background-color 5000s ease-in-out 0s;
    }

    .row-links{ display:flex; gap:12px; font-size:13px; margin-top:8px }
    .row-links a{ color:var(--accent); text-decoration:none; font-weight:700; border-bottom:1px dashed rgba(255,255,255,.22) }
    .row-links a:hover{ color:#fff; border-bottom-color:rgba(255,255,255,.38) }

    /* ===== Anmelden-Button: Glow gezähmt (keine Überstrahlung) ===== */
    .submit{
      margin-top:14px; border:0; border-radius:14px; padding:15px 18px;
      font-weight:900; font-size:16px; color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      /* dezenter Lift, ohne große äußere Leuchtwolke */
      box-shadow:
        0 8px 18px rgba(224,39,36,.18),         /* kleiner äußerer Schatten */
        0 1px 0 rgba(255,255,255,.06) inset,    /* feine Lichtkante */
        0 -2px 0 rgba(0,0,0,.25) inset;         /* dunkle Unterkante */
      transition:transform .08s ease, box-shadow .12s ease, filter .12s ease;
    }
    .submit:hover{
      filter:saturate(1.05);
      box-shadow:
        0 10px 22px rgba(224,39,36,.22),
        0 1px 0 rgba(255,255,255,.08) inset,
        0 -2px 0 rgba(0,0,0,.25) inset;
    }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{ text-align:center; margin:14px 0 20px; font-size:13px; color:var(--muted) }

    /* ===== Footer: mehr Luft, nicht gequetscht ===== */
    .foot{
      margin-top:12px;
      padding:18px 24px 22px;               /* mehr Bottom-Padding */
      border-top:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.01), rgba(0,0,0,.05));
      text-align:center; color:var(--muted); font-size:12px;
      line-height:1.5;
    }
    .foot small{ display:block }

    /* Layout-Feinschliff für kleine Screens */
    @media (max-width:480px){
      .badge{ transform:translate(-50%,-42%) scale(.9); }
      .wordmark{ height:36px }
      .content{ padding:14px 16px 0 }
      .foot{ padding:16px 16px 20px }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Schwebendes Badge -->
    <div class="badge" aria-hidden="true"><span class="txt">HD</span></div>

    <div class="card" role="group" aria-labelledby="hd-title">
      <!-- Header mit PNG-Wortmarke -->
      <div class="brand">
        <img src="/Hotel-Dashboard-Schriftzug.png" alt="Hotel‑Dashboard" class="wordmark" id="hd-title">
      </div>

      <div class="content">
        <div class="error" id="err" style="display:none">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div style="margin-top:12px">
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                <!-- geschlossen -->
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                  <line x1="3" y1="3" x2="21" y2="21"/>
                </svg>
                <!-- offen -->
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="caps" id="caps" style="display:none;color:#ef4444;font-size:12px;margin-top:6px">Warnung: Feststelltaste ist aktiv.</div>
          </div>

          <div class="row-links" style="margin-top:10px">
            <a href="/reset">Passwort vergessen?</a>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>
          © <span id="y"></span> Hotel‑Dashboard<br>
          Powered by MY HOME HOTEL AM ROTTWEIL GMBH
        </small>
      </div>
    </div>
  </div>

  <script>
    // Footer-Jahr
    document.getElementById('y').textContent = new Date().getFullYear();

    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');
    const c  = document.getElementById('caps');
    const err= document.getElementById('err');

    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });

    ['keydown','keyup'].forEach(ev => p.addEventListener(ev, e => {
      try { c.style.display = e.getModifierState('CapsLock') ? 'block' : 'none'; } catch(_){}
    }));

    if (new URLSearchParams(location.search).get('err')) err.style.display='block';
  </script>
</body>
</html>
