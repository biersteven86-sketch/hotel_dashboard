<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="light dark">

  <!-- Assets -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <link rel="preload" as="image" href="/Hotel-Dashboard-Schriftzug.png">

  <style>
    :root{
      --bg:#06080c;
      --panel:#000;                 /* Tiefschwarz */
      --text:#fff;
      --muted:#a4aebb;
      --accent:#e02724;
      --accent-2:#b31517;
      --radius:22px;

      /* Steuerung Logo/Schriftzug/Abstände */
      --badge-size: 188px;          /* HD‑Logo: minimal größer (vorher ~180) */
      --wordmark-max: 560px;        /* max Breite des Schriftzug‑PNGs */
      --brand-top: calc(var(--badge-size) * 0.62);  /* Ankopplung unter dem HD‑Logo */
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(20px,4vw,60px);
    }

    .card{
      width:min(680px,94vw);
      background:var(--panel);
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.08);
      position:relative;
      overflow:visible; /* wichtig, damit Logo/Schriftzug überstehen dürfen */
      box-shadow:
        0 50px 90px rgba(0,0,0,.9),
        0 1px 0 rgba(255,255,255,.06) inset,
        0 -1px 0 rgba(0,0,0,.85) inset;
      /* etwas Platz oben, aber nicht zu viel, weil Schriftzug absolut sitzt */
      padding-top:calc(var(--badge-size)/2 + 14px);
    }

    /* Glanz/Glow – NEU als separates Overlay, verschiebt NICHTS */
    .shine{
      position:absolute; inset:0; border-radius:inherit; z-index:1;
      pointer-events:none;
      background:
        /* diagonaler Schimmer über die ganze Fläche */
        linear-gradient(135deg,
          rgba(255,255,255,.40) 0%,
          rgba(255,255,255,.22) 36%,
          rgba(255,255,255,0) 78%
        ),
        /* weicher Glow mittig */
        radial-gradient(110% 70% at 50% 48%,
          rgba(255,255,255,.18) 0%,
          rgba(255,255,255,.08) 46%,
          rgba(255,255,255,0) 84%
        );
      background-blend-mode:screen;
      mix-blend-mode:screen;
      opacity:.70;
    }

    /* HD‑Logo übergreifend */
    .badge{
      position:absolute; left:50%; transform:translate(-50%, -52%);
      width:var(--badge-size); height:var(--badge-size);
      z-index:3; pointer-events:none;
      filter:
        drop-shadow(0 14px 22px rgba(0,0,0,.6))
        drop-shadow(0 2px 0 rgba(255,255,255,.08));
    }
    .badge img{ width:100%; height:100%; object-fit:contain; display:block }

    /* Schriftzug-PNG absolut: dockt direkt unter dem HD‑Logo an */
    .brand{
      position:absolute; left:50%; top:var(--brand-top); transform:translateX(-50%);
      z-index:2; display:flex; align-items:center; justify-content:center;
      width:100%; pointer-events:none;
    }
    .wordmark{
      width:min(var(--wordmark-max), 92%);
      height:auto; display:block;
      /* dichter ans Logo: leicht nach oben ziehen */
      transform:translateY(-18px);
      filter:
        drop-shadow(0 8px 16px rgba(0,0,0,.55))
        drop-shadow(0 1px 0 rgba(255,255,255,.10));
    }

    .content{ padding:14px 22px 0; position:relative; z-index:2;
      /* Formular näher ans Logo (ohne Überlappung) */
      margin-top:-4px; /* bei Bedarf -10…+6px feinjustieren */
    }

    .error{
      display:none;
      background:rgba(224,39,36,.12);
      border:1px solid rgba(224,39,36,.38);
      color:#ffd6d6;
      padding:10px 12px; border-radius:12px; font-size:14px; margin:0 0 12px;
    }

    label{ display:block; font-size:13px; color:#fff; margin:0 0 6px }

    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:50px; padding:0 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:#000;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      margin-bottom:10px;
    }
    .field input{
      background:transparent; border:0; outline:0; color:#fff;
      font-size:16px; padding:12px 8px; width:100%;
    }

    /* Autofill Gelb konsequent weg */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active{
      -webkit-box-shadow:0 0 0 1000px #000 inset !important;
      -webkit-text-fill-color:#fff !important;
      caret-color:#fff !important;
      transition:background-color 99999s ease-in-out 0s !important;
    }

    .field button.icon{
      all:unset; cursor:pointer; border-radius:10px;
      padding:8px; display:grid; place-items:center; color:#c7cfdb;
    }
    .icon svg{ width:22px; height:22px; display:block }

    .row-links{ display:flex; gap:12px; font-size:13px; margin-top:6px }
    .row-links a{
      color:var(--accent); text-decoration:none; font-weight:700;
      border-bottom:1px dashed rgba(255,255,255,.22);
    }
    .row-links a:hover{ color:#fff; border-bottom-color:rgba(255,255,255,.45) }

    .submit{
      margin-top:10px; border:0; border-radius:14px;
      padding:14px 18px; font-weight:900; font-size:16px; color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:0 10px 18px rgba(224,39,36,.28),
                 0 0 0 1px rgba(0,0,0,.25) inset,
                 0 1px 0 rgba(255,255,255,.06) inset;
      transition:transform .08s ease, box-shadow .12s ease;
    }
    .submit:hover{ box-shadow:0 14px 24px rgba(224,39,36,.35),
                              0 0 0 1px rgba(0,0,0,.25) inset,
                              0 1px 0 rgba(255,255,255,.08) inset }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{ text-align:center; margin:12px 0 16px; font-size:13px; color:var(--muted) }

    /* größer/luftiger Footer */
    .foot{
      margin-top:12px; padding:20px 22px 26px;
      border-top:1px solid rgba(255,255,255,.06);
      text-align:center; color:var(--muted);
      font-size:15px; line-height:1.55;   /* größer wie gewünscht */
      position:relative; z-index:2;
    }
    .foot small{ display:block }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="group" aria-labelledby="hd-title">
      <!-- Glanz/Glow-Ebene (verschiebt NICHTS) -->
      <div class="shine" aria-hidden="true"></div>

      <!-- HD-Logo -->
      <div class="badge" aria-hidden="true">
        <img src="/HD-Logo.png" alt="">
      </div>

      <!-- PNG-Schriftzug, absolut unter dem HD-Logo -->
      <div class="brand">
        <img src="/Hotel-Dashboard-Schriftzug.png" alt="Hotel‑Dashboard" class="wordmark" id="hd-title">
      </div>

      <div class="content">
        <div class="error" id="err" style="display:none">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                <!-- geschlossen -->
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                  <line x1="3" y1="3" x2="21" y2="21"/>
                </svg>
                <!-- offen -->
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row-links">
            <a href="/reset">Passwort vergessen?</a>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>
          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>© <span id="y"></span> Hotel‑Dashboard<br>
          Powered by MY HOME HOTEL AM ROTTWEIL GMBH</small>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    const u=document.getElementById('username'),
          p=document.getElementById('password'),
          s=document.getElementById('submitBtn'),
          tp=document.getElementById('togglePw'),
          eyeOn=document.getElementById('eye-on'),
          eyeOff=document.getElementById('eye-off'),
          err=document.getElementById('err');

    const update=()=>{ s.disabled=!(u.value.trim() && p.value.trim()); };
    u.addEventListener('input',update);
    p.addEventListener('input',update);
    update();

    tp.addEventListener('click',()=>{
      const show=p.type==="password";
      p.type=show?"text":"password";
      eyeOn.style.display=show?"block":"none";
      eyeOff.style.display=show?"none":"block";
    });

    if(new URLSearchParams(location.search).get('err')) err.style.display='block';
  </script>
</body>
</html>
