<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hotel – Dashboard • Login</title>
  <style>
    :root{
      --bg1:#0b4fa6; --bg2:#1c5fb8; --bg3:#6a3fc7;
      --card-top:rgba(255,255,255,.25); --card-bot:rgba(0,0,0,.12);
      --stroke:rgba(255,255,255,.35);
      --muted:#d2e2ff; --white:#fff;
      --field:#e9f2ff; --fieldText:#21354b;
      --green1:#2ecc71; --green2:#27ae60;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--white); font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(60% 100% at 50% 0%, rgba(255,255,255,.12) 0%, rgba(255,255,255,0) 55%),
        radial-gradient(120% 140% at 0% 100%, rgba(160,80,255,.14) 0%, rgba(160,80,255,0) 55%),
        radial-gradient(110% 130% at 100% 100%, rgba(40,210,255,.12) 0%, rgba(40,210,255,0) 60%),
        linear-gradient(115deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      display:grid; place-items:center; padding:32px;
    }
    .card{
      width:min(920px, 92vw);
      border-radius:22px;
      background: linear-gradient(180deg, var(--card-top), var(--card-bot));
      border:1px solid var(--stroke);
      box-shadow: 0 18px 50px rgba(0,0,0,.28);
      padding:38px 34px 26px;
      position:relative;
    }
    .brand{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:10px}
    .brand .logo{
      width:28px; height:28px; border-radius:4px; background:#d30707;
      display:grid; place-items:center;
      box-shadow: 0 2px 6px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.35);
      font-weight:800; font-size:14px; letter-spacing:.5px;
    }
    .brand .logo span{color:#fff; transform:translateY(1px)}
    .brand .by{font-size:12px; color:var(--muted); opacity:.9}
    .title{
      margin:0 0 8px; text-align:center; font-weight:800;
      font-size: clamp(40px, 7.2vw, 62px);
      text-shadow:0 2px 0 rgba(0,0,0,.25);
      line-height:1.08;
    }
    .subtitle{
      text-align:center; margin:0 0 24px; color:var(--muted);
      font-size: clamp(16px, 2.2vw, 19px);
    }
    .form{display:grid; gap:16px}
    .label{display:block; margin:2px 8px 8px; opacity:.95; font-size: clamp(15px, 2.2vw, 18px)}
    .wrap{position:relative}
    .input{
      width:100%; height: clamp(56px, 7.8vw, 64px);
      border-radius:14px; border:1px solid var(--stroke);
      background:var(--field); color:var(--fieldText);
      padding:0 18px; font-size: clamp(18px, 2.6vw, 22px); line-height:1; outline:none;
      box-shadow: inset 0 2px 6px rgba(0,0,0,.06);
    }
    .input::placeholder{color:#7f9bb6}
    .toggle{
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      width:34px; height:34px; display:grid; place-items:center;
      background: transparent; border:0; cursor:pointer; font-size:20px; line-height:1;
    }
    .btn{
      margin-top:6px; width:100%; height: clamp(56px, 7.8vw, 64px);
      border-radius:16px; border:0; cursor:pointer; font-weight:800; color:#fff;
      font-size: clamp(18px, 2.6vw, 22px);
      background: linear-gradient(180deg, var(--green1), var(--green2));
      box-shadow: 0 10px 22px rgba(39,174,96,.35), inset 0 1px 0 rgba(255,255,255,.35);
    }
    .footer{margin-top:14px; text-align:center; font-size:13px; color:var(--muted)}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo"><span>MH</span></div>
      <div class="by">Powered by My Home Hotel Lam, Rottweil</div>
    </div>

    <h1 class="title">Hotel – Dashboard</h1>
    <p class="subtitle">Anmelden – bitte Zugangsdaten eingeben.</p>

    <form class="form" method="POST" action="/login" autocomplete="on">
      <div>
        <label class="label" for="u">Benutzername</label>
        <div class="wrap">
          <input id="u" name="username" class="input" type="text" placeholder="Benutzername" required />
        </div>
      </div>
      <div>
        <label class="label" for="p">Passwort</label>
        <div class="wrap">
          <input id="p" name="password" class="input" type="password" placeholder="Passwort" required />
          <button type="button" id="pw-toggle" class="toggle" aria-label="Passwort anzeigen">🙈</button>
        </div>
      </div>
      <button class="btn" type="submit">Login</button>
    </form>

    <div class="footer">© 2025 Hotel – Dashboard</div>
  </div>

  <script>
    const pw = document.getElementById('p');
    const btn = document.getElementById('pw-toggle');
    let locked = false;
    const show = ()=>{ pw.type='text'; btn.textContent='🙉'; };
    const hide = ()=>{ pw.type='password'; btn.textContent='🙈'; };
    btn.addEventListener('mouseenter', ()=>{ if(!locked) show(); });
    btn.addEventListener('mouseleave', ()=>{ if(!locked) hide(); });
    btn.addEventListener('click', ()=>{ locked=!locked; locked?show():hide(); pw.focus({preventScroll:true}); });
  </script>
</body>
</html>
