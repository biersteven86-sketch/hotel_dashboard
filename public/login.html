<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="light dark">
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <link rel="preload" as="image" href="/Hotel-Dashboard-Schriftzug.png">
  <style>
    :root{
      /* Grundfarben */
      --bg:#06080c;             /* Seitenhintergrund */
      --panel:#0b0f14;          /* Kartenfläche (tiefschwarz) */
      --stroke:#2b323c;         /* zarte Linien */
      --text:#eef2f8;           /* Primärtext */
      --muted:#aab4c0;          /* Sekundärtext */
      --accent:#e02824;         /* Rot */
      --accent-2:#b31618;

      /* Größen-Abstimmung */
      --radius:20px;
      --card-w:  720px;         /* Maxbreite Karte */
      --hd:      108px;         /* Größe HD-Logo (kannst du hier feintunen) */
      --gap-top:  22px;         /* Lücke HD → Schriftzug */
      --gap-title:18px;         /* Lücke Schriftzug → Formular */
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(16px,4vw,64px);
    }

    /* ----------------- Karte (Panel) ----------------- */
    .card{
      position:relative;
      width:min(var(--card-w),94vw);
      border-radius:calc(var(--radius) + 2px);
      background:var(--panel);
      border:1px solid rgba(255,255,255,.05);
      box-shadow:
        0 20px 60px rgba(0,0,0,.65),
        0 2px 0 rgba(255,255,255,.02) inset;
      overflow:hidden;
      padding: clamp(18px,2.6vw,26px);
      padding-top: calc(var(--hd) * .65 + 24px); /* Platz unter dem schwebenden Logo */
    }

    /* gleichmäßiger „glossy-matt“-Sheen über die GESAMTE Fläche */
    .card::before{
      content:"";
      position:absolute; inset:0;
      background:
        /* weicher Top-Glanz */
        linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06) 14%, rgba(0,0,0,0) 26%) ,
        /* breite, matte Lichtkuppel */
        radial-gradient(120% 140% at 50% -10%, rgba(255,255,255,.20) 0%, rgba(255,255,255,.10) 28%, rgba(0,0,0,0) 60%) ,
        /* sanfte Vignette */
        radial-gradient(140% 120% at 50% 120%, rgba(0,0,0,.45) 0%, rgba(0,0,0,.28) 40%, rgba(0,0,0,.0) 60%);
      pointer-events:none;
      mix-blend-mode:normal;
    }
    /* dezente Ober-/Unterkante */
    .card::after{
      content:"";
      position:absolute; inset:0 0 auto 0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      pointer-events:none;
    }

    /* ----------------- Logo-Stack (fixiert zur Karte) ----------------- */
    .brand-stack{
      position:absolute;
      top:0; left:50%;
      transform:translate(-50%, calc(-50% + 4px)); /* steht sichtbar über der Karte */
      width:min(32vw, 480px);
      display:grid;
      justify-items:center;
      align-items:start;
      pointer-events:none;         /* keine Klicks abfangen */
      z-index:3;
    }
    .brand-stack .hd{
      width:var(--hd);
      height:var(--hd);
      object-fit:contain;
      filter:
        drop-shadow(0 6px 12px rgba(0,0,0,.55))
        drop-shadow(0 1px 0 rgba(255,255,255,.08));
    }
    .brand-stack .wordmark{
      margin-top:var(--gap-top);
      width:min(78%, 520px);
      height:auto;
      object-fit:contain;
      filter:
        drop-shadow(0 2px 0 rgba(0,0,0,.35))
        drop-shadow(0 10px 26px rgba(0,0,0,.45));
    }

    /* ----------------- Titelersatz (PNG) + Formular ----------------- */
    .title-spacer{ height: calc(24px + var(--gap-title)); }

    .content{ display:grid; gap:14px; }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:0 0 6px;
    }

    .field{
      display:grid; grid-template-columns:1fr auto;
      align-items:center;
      min-height:50px;
      padding:0 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(10,12,16,.48);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 10px 26px rgba(0,0,0,.25);
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:var(--text);
      font-size:16px;
      padding:12px 8px;
      width:100%;
      caret-color:#fff;
    }
    .field button.icon{
      all:unset; cursor:pointer; border-radius:10px; padding:8px; display:grid; place-items:center;
      color:#c7cfdb;
    }
    .icon svg{ width:22px; height:22px; display:block }

    /* Autofill neutralisieren (kein Gelb) */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text) !important;
      transition:background-color 5000s ease-in-out 0s;
      box-shadow:0 0 0 1000px transparent inset !important;
      caret-color:#fff;
    }

    .error{
      display:none;
      background:rgba(224,39,36,.12);
      border:1px solid rgba(224,39,36,.45);
      color:#ffd6d6;
      padding:10px 12px; border-radius:12px; font-size:13px; margin:0 0 6px;
    }

    .row-links{
      display:flex; gap:12px; align-items:center;
      font-size:13px; margin-top:4px;
    }
    .row-links a{
      color:var(--accent); text-decoration:none; font-weight:700;
      border-bottom:1px dashed rgba(255,255,255,.22);
    }
    .row-links a:hover{ color:#fff; border-bottom-color:rgba(255,255,255,.45) }

    .submit{
      margin-top:10px;
      border:0;
      border-radius:14px;
      padding:14px 18px;
      font-weight:900; font-size:16px;
      color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:
        0 14px 28px rgba(224,39,36,.32),
        0 1px 0 rgba(255,255,255,.06) inset;
      transition:transform .08s ease, box-shadow .12s ease;
    }
    .submit:hover{
      box-shadow:
        0 18px 38px rgba(224,39,36,.40),
        0 1px 0 rgba(255,255,255,.08) inset;
    }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{ text-align:center; margin:10px 0 10px; font-size:13px; color:var(--muted) }

    .foot{
      margin-top:6px;
      padding:12px 4px 4px;
      border-top:1px solid rgba(255,255,255,.06);
      text-align:center; color:var(--muted); font-size:12px;
    }
    .foot small{ display:block; line-height:1.35 }

    /* --------- Responsive Feinschliff --------- */
    @media (max-width: 560px){
      :root{ --hd: 86px; }
      .brand-stack .wordmark{ width:86%; }
      .card{ padding-top: calc(var(--hd) * .7 + 18px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="group" aria-labelledby="hd-title">

      <!-- Feste, nicht-verschiebbare Markenebene -->
      <div class="brand-stack" aria-hidden="true">
        <img class="hd" src="/HD-Logo.png" alt="">
        <img class="wordmark" src="/Hotel-Dashboard-Schriftzug.png" alt="">
      </div>

      <!-- Platzhalter, damit Formular nicht unter das Wordmark rutscht -->
      <div class="title-spacer" id="hd-title" aria-hidden="true"></div>

      <div class="content">
        <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                <!-- geschlossen -->
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                  <line x1="3" y1="3" x2="21" y2="21"/>
                </svg>
                <!-- offen -->
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row-links">
            <a href="/reset">Passwort vergessen?</a>
          </div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>
          © <span id="y"></span> Hotel‑Dashboard<br>
          Powered by MY HOME HOTEL AM ROTTWEIL GMBH
        </small>
      </div>
    </div>
  </div>

  <script>
    // Footer-Jahr
    document.getElementById('y').textContent = new Date().getFullYear();

    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');
    const err= document.getElementById('err');

    // Submit-Enable
    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    // Toggle Passwort
    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });

    // Fehleranzeige via URL ?err=1
    if (new URLSearchParams(location.search).get('err')) err.style.display='block';
  </script>
</body>
</html>
