<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Hotel-Dashboard Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
    header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
    h1 { margin: 0; font-size: 24px; }
    .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
    .card {
      background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      margin: 15px; padding: 20px; width: 250px; text-align: center;
    }
    .card h2 { margin-top: 0; font-size: 18px; color: #34495e; }
    .status-ok { color: green; font-weight: bold; }
    .status-fail { color: red; font-weight: bold; }
    footer { text-align: center; font-size: 12px; color: #666; padding: 15px; }
  </style>
</head>
<body>
  <header>
    <h1>Hotel-Dashboard – Systemstatus</h1>
  </header>
  <div class="container">
    <div class="card">
      <h2>PortGuard</h2>
      <p class="status-ok">läuft</p>
    </div>
    <div class="card">
      <h2>Watchdog</h2>
      <p class="status-ok">aktiv</p>
    </div>
    <div class="card">
      <h2>Ibelsa API</h2>
      <p class="status-fail">Fehler</p>
    </div>
    <div class="card">
      <h2>Server Last</h2>
      <p>Normal</p>
    </div>
  </div>
  <footer>
    &copy; 2025 Hotel-Dashboard – Systemüberwachung
  </footer>
</body>
</html>
