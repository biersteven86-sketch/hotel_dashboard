<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">

  <!-- Assets -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <link rel="preload" as="image" href="/hotel-dashboard.png">

  <style>
    :root{
      /* Farbpalette */
      --bg:#06080c;           /* Seitenhintergrund */
      --panel:#0b0d11;        /* Login-Panel (tiefschwarz) */
      --stroke:#2a323d;       /* Feldrahmen */
      --text:#e9edf5;         /* Primärtext */
      --muted:#9aa3b2;        /* Sekundärtext */
      --accent:#c3201e;       /* Button-Rot (matter) */
      --accent-2:#8a1718;     /* dunkler Verlauf */
      --radius:20px;
      --shadow:0 22px 42px rgba(0,0,0,.6);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(20px,4vw,60px);
    }

    .card{
      width:min(460px, 90vw);  /* SCHMALER gemacht */
      background:var(--panel);
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.05);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
      padding-top:140px; /* Platz für Logo + Schriftzug */
    }

    /* Glanz-Effekt über die ganze Fläche */
    .card::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,.08), transparent 70%),
        linear-gradient(to bottom, rgba(255,255,255,.05), transparent 40%);
      pointer-events:none;
    }

    /* Logo oben */
    .logo-box{
      position:absolute;
      top:-60px;
      left:50%;
      transform:translateX(-50%);
      text-align:center;
      z-index:2;
    }
    .logo-box img{
      display:block;
      margin:0 auto;
    }
    .logo-hd{
      width:clamp(90px, 12vw, 120px);
      height:auto;
    }
    .logo-title{
      width:clamp(240px, 50vw, 360px);
      margin-top:8px;
      height:auto;
    }

    .content{ padding:20px 24px 0 }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:0 0 6px;
    }

    /* Eingabefelder */
    .field{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      min-height:50px;
      padding:0 10px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(0,0,0,.25);
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:var(--text);
      font-size:16px;
      padding:12px 8px;
      width:100%;
    }

    /* Button */
    .submit{
      margin-top:16px;
      border:0;
      border-radius:14px;
      padding:14px 18px;
      font-weight:900; font-size:16px;
      color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:0 12px 28px rgba(195,32,30,.35);
    }
    .submit:hover{ opacity:0.9 }

    .help{ text-align:center; margin:12px 0; font-size:13px; color:var(--muted) }

    .foot{
      margin-top:8px;
      padding:14px 20px 18px;
      border-top:1px solid rgba(255,255,255,.06);
      text-align:center; color:var(--muted); font-size:12px;
    }
    .foot small{ display:block; line-height:1.35 }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <!-- Logo + Schriftzug -->
      <div class="logo-box">
        <img src="/HD-Logo.png" alt="HD Logo" class="logo-hd">
        <img src="/hotel-dashboard.png" alt="Hotel-Dashboard" class="logo-title">
      </div>

      <div class="content">
        <form action="/login" method="POST">
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" required />
            </div>
          </div>

          <button class="submit" type="submit">Anmelden</button>
          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>© <span id="y"></span> Hotel-Dashboard<br>Powered by MY HOME HOTEL AM ROTTWEIL GMBH</small>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
