<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <style>
    :root{
      --bg:#0b1020;
      --glass:rgba(255,255,255,.10);
      --glass-strong:rgba(255,255,255,.18);
      --stroke:rgba(255,255,255,.25);
      --text:#eef2ff;
      --muted:#b7c0d8;
      --accent:#ef4444;     /* Rot */
      --accent-2:#7c5cff;   /* Violett */
      --shadow:0 10px 30px rgba(0,0,0,.45);
      --radius:18px;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(124,92,255,.20), transparent 60%),
        radial-gradient(1200px 600px at 90% 90%, rgba(56,189,248,.18), transparent 60%),
        linear-gradient(to bottom right, rgba(0,0,0,.25), rgba(0,0,0,.35));
    }
    .wrap{min-height:100%; display:grid; place-items:center; padding:clamp(20px,4vw,60px)}
    .card{
      width:min(420px,92vw);
      border-radius:var(--radius);
      background:linear-gradient(180deg,var(--glass),rgba(255,255,255,.06));
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    /* Branding */
    .brand{display:flex; align-items:center; gap:16px; padding:24px 22px 10px}
    .logo-box{
      width:72px; height:72px; border-radius:16px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:28px; color:#fff;
      text-shadow:0 2px 6px rgba(0,0,0,.4);
      box-shadow:0 6px 16px rgba(239,68,68,.45), inset 0 0 12px rgba(255,255,255,.2);
      flex-shrink:0;
    }
    .brand-text h1{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:.5px;
    }
    .brand-text p{
      margin:4px 0 0;
      font-size:13px;
      color:var(--muted);
    }

    /* Rest wie gehabt */
    .content{ padding:20px 22px 24px }
    form{ display:grid; gap:14px }
    label{ font-size:13px; color:var(--muted); display:block; margin:0 0 6px }
    .field{ background:var(--glass-strong); border:1px solid var(--stroke);
      border-radius:14px; display:flex; align-items:center; padding:10px 12px }
    .field input{ flex:1; background:transparent; border:0; outline:0; color:var(--text); font-size:15px; padding:6px 2px }
    .field button.icon{ all:unset; cursor:pointer; padding:6px 8px; border-radius:10px }
    .row{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:4px }
    .row .left{ display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px }
    .caps{ display:none; color:#ef4444; font-size:12px }
    .error{ display:none; background:rgba(239,68,68,.14); border:1px solid rgba(239,68,68,.45); color:#fecaca; padding:10px 12px; border-radius:12px; font-size:13px }
    .submit{ margin-top:6px; background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff; border:0; border-radius:14px; padding:12px 16px; font-weight:700; font-size:15px; cursor:pointer;
      box-shadow:0 10px 24px rgba(124,92,255,.35); transition:transform .08s ease }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .foot{ text-align:center; color:var(--muted); font-size:12px; padding:12px 18px 18px }
    a.muted{ color:var(--muted); text-decoration:none; border-bottom:1px dashed rgba(255,255,255,.25) }
    a.muted:hover{ color:var(--text); border-bottom-color:rgba(255,255,255,.45) }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="logo-box">HD</div>
        <div class="brand-text">
          <h1>Hotel-Dashboard</h1>
          <p>Bitte anmelden</p>
        </div>
      </div>

      <div class="content">
        <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>
        <form action="/login" method="POST" id="loginForm">
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" required />
            </div>
          </div>
          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" required />
              <button class="icon" type="button" id="togglePw">👁️</button>
            </div>
            <div class="caps" id="caps">Warnung: Feststelltaste ist aktiv.</div>
          </div>
          <div class="row">
            <div class="left">
              <input type="checkbox" id="remember" disabled>
              <label for="remember">Angemeldet bleiben</label>
            </div>
          </div>
          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>
        </form>
      </div>

      <div class="foot">
        <small>© <span id="y"></span> Hotel-Dashboard · <a class="muted" href="/status">Status</a></small>
      </div>
    </div>
  </div>

<script>
  document.getElementById('y').textContent = new Date().getFullYear();
  const u=document.getElementById('username'),
        p=document.getElementById('password'),
        s=document.getElementById('submitBtn'),
        tp=document.getElementById('togglePw'),
        c=document.getElementById('caps');
  const update=()=>{ s.disabled=!(u.value&&p.value); };
  u.addEventListener('input',update); p.addEventListener('input',update); update();
  tp.addEventListener('click',()=>{ p.type=p.type==="password"?"text":"password"; });
  ['keydown','keyup'].forEach(ev=>p.addEventListener(ev,e=>{ try{c.style.display=e.getModifierState('CapsLock')?'block':'none';}catch(_){}}));
</script>
</body>
</html>
