<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="light dark">

  <!-- Assets -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/HD-Logo.png">
  <link rel="preload" as="image" href="/Hotel-Dashboard-Schriftzug.png">

  <style>
    :root{
      /* Farben / Look */
      --page:#06080c;
      --text:#ffffff;
      --muted:#d5d7da;
      --accent:#e02824;
      --accent-2:#b31618;

      /* Karte (Glas, basierend auf deinem #676767) */
      --panel-r:103; --panel-g:103; --panel-b:103; --panel-alpha:.28;
      --panel-border:rgba(255,255,255,.10);

      /* Größen */
      --card-w:640px;
      --radius:22px;

      /* Brand-Stack */
      --hd:140px;                        /* Logo-Größe (Zwischenmaß) */
      --word-gap:0px;                    /* HD ↔ Wordmark praktisch 0 */
      --title-w: clamp(320px, 78vw, 580px);
      --title-gap:8px;                   /* Wordmark → Formular sehr eng */
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--page) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(18px,4vw,60px);
    }

    /* ===== Karte (Glas) ===== */
    .card{
      position:relative;
      width:min(var(--card-w), 94vw);
      border-radius:var(--radius);
      background:rgba(var(--panel-r),var(--panel-g),var(--panel-b),var(--panel-alpha));
      backdrop-filter: blur(8px) saturate(120%);
      -webkit-backdrop-filter: blur(8px) saturate(120%);
      border:1px solid var(--panel-border);
      box-shadow:0 26px 70px rgba(0,0,0,.68);
      padding:clamp(18px,2.2vw,24px);
      /* Platz für Brand-Stack: Logo sitzt an der Oberkante */
      padding-top: calc(var(--hd) * .62 + var(--title-gap) + 14px);
      overflow:visible;
    }
    .card::after{
      content:""; position:absolute; inset:0 0 auto 0; height:1px; pointer-events:none;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }

    /* ===== Brand: Logo bündig oben, Wordmark direkt darunter ===== */
    .brand-stack{
      position:absolute; left:50%; top:0;
      transform:translateX(-50%);  /* nur horizontal zentrieren */
      display:grid; place-items:center; pointer-events:none; z-index:5;
      width:min(42vw, 640px);
    }
    .brand-stack .hd{
      width:var(--hd); height:var(--hd); object-fit:contain; display:block;
      margin-top:-6px;                   /* leicht an die Kartenkante ziehen */
      margin-bottom:var(--word-gap);
      filter: drop-shadow(0 22px 38px rgba(0,0,0,.55));
    }
    .brand-stack .wordmark{
      width:var(--title-w); height:auto; display:block;
      margin-top:-8px;                   /* „klebt“ ans Logo */
      filter:
        drop-shadow(0 1px 0 rgba(255,255,255,.10))
        drop-shadow(0 16px 26px rgba(0,0,0,.50));
    }

    /* verhindert, dass das Formular mit dem Wordmark kollidiert */
    .title-spacer{ height: var(--title-gap); }

    /* ===== Formular ===== */
    .content{ display:grid; gap:10px; }

    .error{
      display:none;
      background:rgba(224,39,36,.12);
      border:1px solid rgba(224,39,36,.45);
      color:#ffd6d6;
      padding:10px 12px; border-radius:12px; font-size:13px; margin:0 0 8px;
    }

    label{
      display:block; font-size:13px; color:#fff; font-weight:600;
      margin:0 0 4px;
    }

    /* Felder: transparent, nur Outline */
    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:48px; padding:0 12px;
      border-radius:14px;
      background:transparent;                 /* << kein Flächenhintergrund */
      border:1.2px solid rgba(255,255,255,.45);
      transition:border-color .15s ease, box-shadow .15s ease;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 10px 26px rgba(0,0,0,.35);
    }
    .field:focus-within{
      border-color:#fff;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.45),
        0 14px 34px rgba(0,0,0,.55);
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:#fff; font-size:16px; padding:10px 8px; width:100%;
      caret-color:#fff;
    }
    .field input::placeholder{ color:rgba(255,255,255,.85); }
    .field button.icon{
      all:unset; cursor:pointer; border-radius:10px; padding:6px; display:grid; place-items:center;
      color:#c7cfdb;
    }
    .icon svg{ width:22px; height:22px; display:block }

    /* === Autofill/Passwort-Manager GELB neutralisieren (alle) === */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active{
      -webkit-text-fill-color:#fff !important;
      caret-color:#fff !important;
      background-color: transparent !important;
      -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
      box-shadow: 0 0 0 1000px transparent inset !important;
      filter:none !important;
    }
    /* Firefox */
    input:autofill { background-color: transparent !important; color:#fff !important; }

    .row-links{ display:flex; gap:12px; font-size:13px; margin-top:2px }
    .row-links a{
      color:var(--accent); text-decoration:none; font-weight:700;
      border-bottom:1px dashed rgba(255,255,255,.22);
    }
    .row-links a:hover{ color:#fff; border-bottom-color:rgba(255,255,255,.45) }

    .submit{
      margin-top:8px; border:0; border-radius:14px; padding:12px 18px;
      font-weight:900; font-size:16px; color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow: 0 14px 28px rgba(224,39,36,.32), 0 1px 0 rgba(255,255,255,.06) inset;
      transition:transform .08s ease, box-shadow .12s ease;
    }
    .submit:hover{
      box-shadow: 0 18px 38px rgba(224,39,36,.40), 0 1px 0 rgba(255,255,255,.08) inset;
    }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{ text-align:center; margin:8px 0 10px; font-size:13px; color:var(--muted) }

    /* ===== dunkler Footer-Balken ===== */
    .foot{
      margin-top:8px;
      padding:12px 10px 8px;
      border-top:1px solid rgba(255,255,255,.12);
      text-align:center; font-size:12.5px; line-height:1.45;
      background:rgba(0,0,0,.65);
      border-radius:0 0 var(--radius) var(--radius);
      color:#fff;
    }
    .foot small{ display:block }

    /* Mobile Tweaks */
    @media (max-width:560px){
      :root{ --card-w:92vw; --hd:128px; --title-w: clamp(280px, 90vw, 540px); }
      .card{ padding-top: calc(var(--hd) * .64 + var(--title-gap) + 12px); }
      .brand-stack .wordmark{ margin-top:-6px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="group" aria-labelledby="hd-title">
      <!-- Brand oben bündig -->
      <div class="brand-stack" aria-hidden="true">
        <img class="hd" src="/HD-Logo.png" alt="HD">
        <img class="wordmark" src="/Hotel-Dashboard-Schriftzug.png" alt="Hotel‑Dashboard" id="hd-title">
      </div>

      <div class="title-spacer" aria-hidden="true"></div>

      <div class="content">
        <div class="error" id="err" role="alert" aria-live="assertive">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button class="icon" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                <!-- geschlossen -->
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                  <line x1="3" y1="3" x2="21" y2="21"/>
                </svg>
                <!-- offen -->
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row-links"><a href="/reset">Passwort vergessen?</a></div>

          <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>
          © <span id="y"></span> Hotel‑Dashboard · Powered by MY HOME HOTEL AM ROTTWEIL GMBH
        </small>
      </div>
    </div>
  </div>

  <script>
    // Jahr
    document.getElementById('y').textContent = new Date().getFullYear();

    const form = document.getElementById('loginForm');
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');
    const err= document.getElementById('err');

    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
      p.focus();
    });

    // Fehlermeldung via ?err=1
    if (new URLSearchParams(location.search).get('err')) err.style.display='block';

    // Submit-Feedback
    form.addEventListener('submit', () => { s.disabled = true; s.textContent = 'Anmelden…'; });
  </script>
</body>
</html>
