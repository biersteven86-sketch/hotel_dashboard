<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">

  <style>
    :root{
      --page:#06080c;
      --text:#eef2f8;
      --muted:#cfd6de;
      --accent:#e02824; --accent-2:#b31618;

      --panel-r:103; --panel-g:103; --panel-b:103;
      --panel-alpha:.28;
      --panel-border:rgba(255,255,255,.10);

      --card-w:640px; --radius:22px;

      --hd:100px;
      --word-gap:6px;
      --title-w: clamp(300px, 78%, 540px);
      --title-gap:8px;
    }

    body{
      margin:0; height:100%;
      display:grid; place-items:center;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
      color:var(--text);
      background:var(--page) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
      padding:clamp(18px,4vw,60px);
    }

    .card{
      position:relative;
      width:min(var(--card-w),94vw);
      border-radius:var(--radius);
      background:rgba(var(--panel-r),var(--panel-g),var(--panel-b),var(--panel-alpha));
      backdrop-filter:blur(8px) saturate(120%);
      -webkit-backdrop-filter:blur(8px) saturate(120%);
      border:1px solid var(--panel-border);
      box-shadow:0 26px 70px rgba(0,0,0,.68);
      padding: clamp(18px,2.2vw,24px);
      padding-top: calc(var(--hd) + var(--title-gap) + 14px);
    }

    /* Logo ganz oben ansetzen */
    .brand-stack{
      position:absolute; left:50%; top:0;
      transform:translateX(-50%); /* nur horizontale Zentrierung */
      display:grid; place-items:center;
      pointer-events:none;
      width:min(32vw,520px);
    }
    .brand-stack .hd{
      width:var(--hd); height:var(--hd);
      display:block; object-fit:contain;
      margin-bottom:var(--word-gap);
      filter:drop-shadow(0 22px 38px rgba(0,0,0,.55));
    }
    .brand-stack .wordmark{
      width:var(--title-w);
      margin-top:0; /* klebt direkt ans Logo */
      filter:drop-shadow(0 1px 0 rgba(255,255,255,.10))
             drop-shadow(0 16px 26px rgba(0,0,0,.50));
    }

    .title-spacer{ height:var(--title-gap); }

    .content{ display:grid; gap:10px; }

    label{ font-size:13px; font-weight:600; color:#fff; margin:0 0 4px; }

    .field{
      display:grid; grid-template-columns:1fr auto; align-items:center;
      min-height:48px; padding:0 12px;
      border-radius:14px;
      background:transparent;
      border:1.2px solid rgba(255,255,255,.25);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06),
                 0 10px 26px rgba(0,0,0,.40);
    }
    .field:focus-within{
      border-color:rgba(255,255,255,.42);
      box-shadow:0 0 0 3px rgba(224,40,36,.18),
                 0 14px 34px rgba(0,0,0,.55);
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:#fff; font-size:16px; padding:10px 8px; width:100%;
    }
    .field input::placeholder{ color:rgba(255,255,255,.85); }

    .submit{
      margin-top:8px;
      border:0; border-radius:14px; padding:12px 18px;
      font-weight:900; font-size:16px; color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
    }
    .submit:disabled{ opacity:.6; cursor:not-allowed; }

    /* Footer jetzt mit dunklerem BG */
    .foot{
      margin-top:6px;
      padding:12px 6px 6px;
      border-top:1px solid rgba(255,255,255,.12);
      text-align:center;
      font-size:12.5px;
      line-height:1.45;
      background:rgba(0,0,0,.45);  /* dunkler Balken hinter Info-Text */
      border-radius:0 0 var(--radius) var(--radius);
    }
    .foot small{ color:#fff; display:block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-stack" aria-hidden="true">
      <img class="hd" src="/HD-Logo.png" alt="HD">
      <img class="wordmark" src="/Hotel-Dashboard-Schriftzug.png" alt="Hotel-Dashboard">
    </div>

    <div class="title-spacer"></div>

    <div class="content">
      <form action="/login" method="POST" id="loginForm" novalidate>
        <div>
          <label for="username">Benutzername</label>
          <div class="field">
            <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
          </div>
        </div>

        <div>
          <label for="password">Passwort</label>
          <div class="field">
            <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>
        </div>

        <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>
      </form>
    </div>

    <div class="foot">
      <small>
        © <span id="y"></span> Hotel-Dashboard<br>
        Powered by MY HOME HOTEL AM ROTTWEIL GMBH
      </small>
    </div>
  </div>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
    const u=document.getElementById('username'),
          p=document.getElementById('password'),
          s=document.getElementById('submitBtn');
    const update=()=>{s.disabled=!(u.value.trim()&&p.value.trim())};
    u.addEventListener('input',update); p.addEventListener('input',update); update();
  </script>
</body>
</html>
