<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel‑Dashboard</title>
  <meta name="color-scheme" content="light dark" />

  <!-- ============ PRELOADS ============ -->
  <link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
  <link rel="preload" as="image" href="/Hotel-Dashboard-mit-Schriftzug.png">

  <style>
    /* ===================== THEMA / TUNING =====================
       Alle wichtigen Stellschrauben an EINER Stelle:
       --------------------------------------------------------- */
    :root{
      /* Hintergrund + Panel-Farben (mattes, tiefes Anthrazit) */
      --bg:#06080c;
      --panel:#0b0f14;
      --panel-edge:#121820;

      /* Typografie + Kontraste */
      --text:#e9edf5;
      --muted:#a8b3c2;

      /* Akzent Rot (Button/Unterkante) */
      --accent:#e02724;
      --accent-2:#b31517;

      /* Kartenbreite/Geometrie */
      --card-max: 420px;          /* <<< Karte schmal halten (vorher ~560px) */
      --card-radius: 20px;

      /* Gemeinsames PNG (HD + Schriftzug) Position/Größe */
      --brand-scale: 1.08;        /* <<< 1.00 = exakt Kartenbreite; >1 etwas breiter */
      --brand-lift: 56px;         /* <<< wie weit das PNG ÜBER der Karte „schwebt“ */
      --brand-gap: 6px;           /* Abstand von PNG zur Kartenoberkante */

      /* „Glänzend-matt“: globale Lichtführung über Karte */
      --gloss-strength: .55;      /* 0–1: wie stark die Glossy-Überlagerung wirkt */
      --gloss-spread: 220%;       /* Fläche der Radial-Glanzlinse */
      --vignette: .38;            /* Randabdunklung gegen helle Ecken */

      /* Feld/Border-Feinschliff */
      --stroke:#2a323d;
      --field-bg: rgba(0,0,0,.16);
      --field-radius: 12px;

      /* Schatten */
      --shadow-strong: 0 28px 58px rgba(0,0,0,.66), 0 1px 0 rgba(255,255,255,.03) inset;
      --shadow-soft:   0 10px 30px rgba(0,0,0,.45);

      /* Button */
      --btn-radius: 14px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background: var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    /* ===================== LAYOUT WRAP ===================== */
    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(20px,4vw,60px);
    }

    /* Ein Stack hält: 1) das Marken‑PNG (absolut) + 2) die Karte */
    .stack{
      width:min(var(--card-max), 92vw);
      position:relative;
    }

    /* ===================== BRAND PNG (HD + Schriftzug) =====================
       - liegt ÜBER der Karte, wird NICHT abgeschnitten
       - skaliert relativ zur Kartenbreite (per --brand-scale)
    ---------------------------------------------------------------------- */
    .brand-img{
      position:absolute;
      left:50%;
      transform: translateX(-50%);
      width: calc(100% * var(--brand-scale));
      /* Unterkante des HD‑Hexagons leicht über der Kartenoberkante ausrichten: */
      top: calc(-1 * var(--brand-lift));
      filter:
        drop-shadow(0 12px 22px rgba(0,0,0,.55))   /* tiefer Schatten */
        drop-shadow(0 1px 0 rgba(255,255,255,.06));/* leichte Kante */
      pointer-events:none; /* nicht anklickbar */
      user-select:none;
    }

    /* ===================== CARD ===================== */
    .card{
      width:100%;
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0) 22%), /* obere weiche Lichtkante */
        linear-gradient( to bottom,
          rgba(255,255,255,.03),
          rgba(0,0,0,.00) 40%,
          rgba(0,0,0,.20) 100%),                                                   /* matter Verlauf */
        radial-gradient(120% 200% at 12% -10%, rgba(255,255,255,var(--gloss-strength)) 0%,
                        rgba(255,255,255,0) 45%),
        linear-gradient(180deg, var(--panel), #0a0e13);
      border-radius: var(--card-radius);
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow-strong);
      overflow:hidden; /* Inhalte innen sauber abschließen (Brand ist außerhalb) */
      padding: 20px 22px 18px;
    }

    /* Dezente Vignette gegen „helle Ecken“ */
    .card::after{
      content:"";
      position:absolute; inset:0;
      pointer-events:none;
      background:
        radial-gradient(180% 160% at 50% 0%,
          rgba(0,0,0,calc(var(--vignette)*.15)) 0%,
          rgba(0,0,0,0) 46%),
        radial-gradient(140% 100% at 50% 120%,
          rgba(0,0,0,var(--vignette)) 0%,
          rgba(0,0,0,0) 55%);
      mix-blend-mode:multiply;
    }

    .header-space{
      /* Platz nach oben, damit das Brand-PNG „in die Karte“ greifen kann */
      height: calc(var(--brand-lift) + var(--brand-gap));
    }

    .title{
      margin: 0 0 12px;
      font-weight:900;
      font-size: clamp(22px, 3.4vw, 30px);
      letter-spacing:.2px;
      text-align:center;
      text-shadow:
        0 1px 0 rgba(255,255,255,.20),
        0 10px 26px rgba(0,0,0,.65);
    }

    .group{ margin: 10px 0 0 }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
    }

    .field{
      display:grid; grid-template-columns:1fr auto;
      align-items:center;
      min-height:48px;
      padding:0 10px;
      border-radius: var(--field-radius);
      border:1px solid var(--stroke);
      background: var(--field-bg);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .field input{
      background:transparent; border:0; outline:0;
      color:var(--text);
      font-size:16px;
      padding:12px 8px;
      width:100%;
    }

    /* Autofill neutral (kein gelbes Chrome-Feld) */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text) !important;
      box-shadow:0 0 0 1000px transparent inset !important;
      transition:background-color 5000s ease-in-out 0s;
    }

    .icon-btn{
      all:unset; cursor:pointer; border-radius:10px; padding:8px; display:grid; place-items:center;
      color:#c7cfdb;
    }
    .icon-btn svg{ width:22px; height:22px; display:block }

    .row-links{
      display:flex; gap:12px; align-items:center;
      font-size:13px; margin:8px 0 0;
    }
    .row-links a{
      color:var(--accent); text-decoration:none; font-weight:700;
      border-bottom:1px dashed rgba(255,255,255,.22);
    }
    .row-links a:hover{ color:#fff; border-bottom-color:rgba(255,255,255,.45) }

    .submit{
      margin-top:14px;
      width:100%;
      border:0; border-radius: var(--btn-radius);
      padding:14px 18px;
      font-weight:900; font-size:16px; color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:
        0 14px 28px rgba(224,39,36,.34),
        0 1px 0 rgba(255,255,255,.07) inset;
      transition: transform .08s ease, box-shadow .12s ease;
    }
    .submit:hover{
      box-shadow:
        0 18px 36px rgba(224,39,36,.42),
        0 1px 0 rgba(255,255,255,.09) inset;
    }
    .submit:active{ transform:translateY(1px) scale(.997) }
    .submit:disabled{ opacity:.6; cursor:not-allowed; box-shadow:none }

    .help{ text-align:center; margin:12px 0 16px; font-size:13px; color:var(--muted) }

    .foot{
      margin-top:8px;
      padding:12px 2px 2px;
      border-top:1px solid rgba(255,255,255,.06);
      text-align:center; color:var(--muted); font-size:12px;
    }
    .foot small{ display:block; line-height:1.35 }

    /* Fehlermeldung */
    .error{
      display:none;
      background:rgba(224,39,36,.12);
      border:1px solid rgba(224,39,36,.45);
      color:#ffd6d6;
      padding:10px 12px; border-radius:12px; font-size:13px; margin:0 0 10px;
    }

    /* Kleinere Screens: etwas mehr Platz nach oben */
    @media (max-width: 420px){
      :root{ --brand-lift: 48px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stack" role="group" aria-labelledby="hd-title">
      <!-- Ein PNG mit HD + Hotel‑Dashboard, sitzt ÜBER der Karte -->
      <img class="brand-img"
           src="/Hotel-Dashboard-mit-Schriftzug.png"
           alt="HD Logo und Hotel‑Dashboard Schriftzug">

      <!-- Karte -->
      <div class="card">
        <!-- Platzhalter oben, damit die Karte das Brand-PNG „aufnimmt“ -->
        <div class="header-space" aria-hidden="true"></div>

        <!-- (Optional) sichtbarer Texttitel falls PNG einmal fehlt -->
        <h1 class="title" id="hd-title" aria-hidden="true">Hotel‑Dashboard</h1>

        <div class="content">
          <div class="error" id="err">Anmeldung fehlgeschlagen. Bitte prüfen.</div>

          <form action="/login" method="POST" id="loginForm" novalidate>
            <div class="group">
              <label for="username">Benutzername</label>
              <div class="field">
                <input id="username" name="username" type="text"
                       placeholder="z. B. admin" autocomplete="username" required />
              </div>
            </div>

            <div class="group">
              <label for="password">Passwort</label>
              <div class="field">
                <input id="password" name="password" type="password"
                       placeholder="••••••••" autocomplete="current-password" required />
                <button class="icon-btn" type="button" id="togglePw" aria-label="Passwort anzeigen/ausblenden">
                  <!-- geschlossen -->
                  <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-5.05 0-9.27-3.11-11-8 1.02-2.93 3.03-5.19 5.47-6.53m3.17-1.19A9.77 9.77 0 0112 4c5.05 0 9.27 3.11 11 8a11.73 11.73 0 01-1.41 2.94M9.88 9.88A3 3 0 1112 15a3 3 0 01-2.12-5.12z"/>
                    <line x1="3" y1="3" x2="21" y2="21"/>
                  </svg>
                  <!-- offen -->
                  <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="row-links">
              <a href="/reset">Passwort vergessen?</a>
            </div>

            <button class="submit" id="submitBtn" type="submit" disabled>Anmelden</button>
            <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
          </form>
        </div>

        <div class="foot">
          <small>
            © <span id="y"></span> Hotel‑Dashboard<br>
            Powered by MY HOME HOTEL AM ROTTWEIL GMBH
          </small>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Footer-Jahr
    document.getElementById('y').textContent = new Date().getFullYear();

    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const s = document.getElementById('submitBtn');
    const tp = document.getElementById('togglePw');
    const eyeOn  = document.getElementById('eye-on');
    const eyeOff = document.getElementById('eye-off');
    const err= document.getElementById('err');

    const update = () => { s.disabled = !(u.value.trim() && p.value.trim()); };
    u.addEventListener('input', update);
    p.addEventListener('input', update);
    update();

    tp.addEventListener('click', () => {
      const show = p.type === "password";
      p.type = show ? "text" : "password";
      eyeOn.style.display  = show ? "block" : "none";
      eyeOff.style.display = show ? "none"  : "block";
    });

    if (new URLSearchParams(location.search).get('err')) err.style.display='block';
  </script>
</body>
</html>
