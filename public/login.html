<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    html,body{height:100%;margin:0}
    body{
      font-family: Arial, sans-serif;
      display:flex;align-items:center;justify-content:center;
      background: #0d0d0d url('/hotel-dashboard-bg.jpg') center/cover no-repeat fixed;
    }
    .login-container{
      background: rgba(255,255,255,.92);
      width: 100%; max-width: 380px; padding: 26px;
      border-radius: 12px; box-shadow: 0 8px 18px rgba(0,0,0,.25);
      text-align:center;
    }
    .login-container h1{margin:0 0 18px;color:#222}
    .login-container input{
      width:100%; padding:12px 14px; margin: 10px 0;
      border:1px solid #ccc; border-radius:8px; font-size:16px;
    }
    .login-container button{
      width:100%; padding:12px; margin-top:8px; border:none;
      border-radius:8px; background:#1976d2; color:#fff; font-size:16px; cursor:pointer;
    }
    .login-container button:hover{background:#1159a3}
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>
    <form method="POST" action="/login">
      <input type="text"     name="username" placeholder="Benutzername" required />
      <input type="password" name="password" placeholder="Passwort"     required />
      <button type="submit">Anmelden</button>
    </form>
  </div>
</body>
</html>
