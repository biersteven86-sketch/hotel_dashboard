<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Hotel-Dashboard</title>
  <meta name="color-scheme" content="light dark">

  <style>
    :root{
      --bg:#06080c;
      --panel:#0b0f14;
      --stroke:#2a323d;
      --text:#e9edf5;
      --muted:#9aa3b2;
      --accent:#e02724;
      --accent-2:#b31517;
      --shadow-strong: 0 28px 60px rgba(0,0,0,.65),
                       0 2px 0 rgba(255,255,255,.02) inset;
      --radius:18px;
    }

    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--text);
      background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:clamp(20px,4vw,60px);
    }

    .card{
      width:min(420px,92vw); /* deutlich schmaler als vorher */
      background:var(--panel);
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.05);
      box-shadow:var(--shadow-strong);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      position:relative;
      backdrop-filter: blur(8px) brightness(1.1);
      background-image: linear-gradient(
        145deg,
        rgba(255,255,255,.10) 0%,
        rgba(255,255,255,.03) 40%,
        rgba(255,255,255,.00) 100%
      );
    }

    .logo-stack{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-top:18px;
      margin-bottom:28px;
    }
    .logo-img{
      width:110px; /* HD Logo etwas kleiner */
      height:auto;
    }
    .logo-text{
      margin-top:-6px;
      width:200px; /* Hotel-Dashboard PNG etwas breiter */
      height:auto;
    }

    .content{ padding:14px 20px 0 }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:0 0 6px;
    }

    .field{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      min-height:46px;
      padding:0 10px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:rgba(0,0,0,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    .field input{
      background:transparent; border:0; outline:0;
      color:var(--text);
      font-size:15px;
      padding:10px 6px;
      width:100%;
    }

    .submit{
      margin-top:14px;
      border:0;
      border-radius:12px;
      padding:13px 18px;
      font-weight:700; font-size:15px;
      color:#fff; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:0 12px 26px rgba(224,39,36,.35);
    }

    .help{ text-align:center; margin:10px 0 14px; font-size:12px; color:var(--muted) }

    .foot{
      margin-top:6px;
      padding:12px 18px 16px;
      border-top:1px solid rgba(255,255,255,.06);
      text-align:center; color:var(--muted); font-size:13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="group" aria-labelledby="hd-title">

      <!-- Logo-Bereich -->
      <div class="logo-stack">
        <img src="/images/HD-Logo.png" alt="HD Logo" class="logo-img">
        <img src="/images/hotel-dashboard.png" alt="Hotel Dashboard" class="logo-text">
      </div>

      <div class="content">
        <form action="/login" method="POST" id="loginForm" novalidate>
          <div>
            <label for="username">Benutzername</label>
            <div class="field">
              <input id="username" name="username" type="text" placeholder="z. B. admin" autocomplete="username" required />
            </div>
          </div>

          <div>
            <label for="password">Passwort</label>
            <div class="field">
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
          </div>

          <button class="submit" id="submitBtn" type="submit">Anmelden</button>

          <div class="help">Bei Problemen wenden Sie sich bitte an den Administrator.</div>
        </form>
      </div>

      <div class="foot">
        <small>
          © <span id="y"></span> Hotel-Dashboard<br>
          Powered by MY HOME HOTEL AM ROTTWEIL GMBH
        </small>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
