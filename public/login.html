<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login · Hotel-Dashboard</title>
<link rel="preload" as="image" href="/hotel-dashboard-bg.jpg">
<style>
  :root{
    --bg:#0b1020;
    --glass:rgba(255,255,255,.10);
    --glass-strong:rgba(255,255,255,.18);
    --stroke:rgba(255,255,255,.25);
    --text:#eef2ff;
    --muted:#b7c0d8;
    --accent:#22c55e;
    --accent-2:#16a34a;
    --shadow:0 10px 30px rgba(0,0,0,.45);
    --radius:24px;

    /* Logo-Farben */
    --logo-red-1:#ff1a1a;
    --logo-red-2:#b80000;
    --logo-border:#0a0a0a;  /* matt-schwarz */
    --logo-glow:rgba(255,0,0,.55);
  }

  body{
    margin:0; height:100%;
    font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Arial;
    color:var(--text);
    background:var(--bg) url("/hotel-dashboard-bg.jpg") center/cover fixed no-repeat;
  }

  .wrap{min-height:100%; display:grid; place-items:center; padding:40px}

  .card{width:min(460px,92vw); border-radius:var(--radius);
    background:linear-gradient(180deg,var(--glass),rgba(255,255,255,.06));
    -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
    border:1px solid var(--stroke); box-shadow:var(--shadow); overflow:hidden}

  .brand{display:flex; align-items:center; gap:16px; padding:24px 22px 10px}

  /* HD-Logo: matt-schwarz + rot innen */
  .logo-box{
    position:relative;
    width:72px; height:72px; border-radius:18px;
    background:var(--logo-border);   /* satter, matt-schwarzer Rand */
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:28px; color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,.65);
  }
  .logo-box::before{
    content:""; position:absolute; inset:6px; border-radius:12px;
    background:linear-gradient(145deg,var(--logo-red-1),var(--logo-red-2));
    box-shadow:0 0 24px 6px var(--logo-glow);
    z-index:0;
  }
  .logo-box span{position:relative; z-index:1}

  .brand-text h1{margin:0; font-size:28px; font-weight:800}
  .brand-text p{margin:6px 0 0; font-size:13px; color:var(--muted)}

  .content{padding:18px 22px 22px}
  .field{background:rgba(255,255,255,.92); border:1px solid rgba(15,23,42,.15);
    border-radius:12px; display:flex; align-items:center; padding:10px 12px}
  .field input{flex:1; border:0; background:transparent; outline:0; font-size:15px; color:#0f172a}
  .submit{margin-top:8px; background:linear-gradient(180deg,var(--accent),var(--accent-2));
    color:#fff; border:0; border-radius:12px; padding:12px 16px; font-weight:700; font-size:15px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="logo-box"><span>HD</span></div>
      <div class="brand-text">
        <h1>Hotel-Dashboard</h1>
        <p>Bitte anmelden</p>
      </div>
    </div>
    <div class="content">
      <form action="/login" method="POST">
        <label for="username">Benutzername</label>
        <div class="field"><input id="username" name="username" type="text" required></div>
        <label for="password">Passwort</label>
        <div class="field"><input id="password" name="password" type="password" required></div>
        <button class="submit">Anmelden</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
