<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root{
      --bg:#0d0f14;
      --panel:#111520;
      --panel-2:#0c1018;
      --text:#e9eef5;
      --muted:#97a3b6;
      --accent:#6ea8ff;
      --accent-2:#7a5cff;
      --ok:#2ecc71;
      --err:#ff5c5c;
      --radius:16px;
      --shadow:0 10px 35px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, "Noto Sans", sans-serif;
      color:var(--text);
      background:radial-gradient(1200px 800px at 10% 0%, #141a26 0%, #0b0f16 60%, #070a0f 100%);
      /* Falls du bereits ein Hintergrundbild nutzt, kommentiere die nächste Zeile ein und passe den Pfad an */
      /* background: url('/hotel-dashboard-bg.jpg') center/cover no-repeat fixed; */
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:48px 16px;
    }

    .card{
      width:min(440px, 92vw);
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:1px solid rgba(255,255,255,.06);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    /* === BRAND / LOGO === */
    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      padding:28px 28px 16px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:
        radial-gradient(600px 200px at -10% -40%, rgba(122,92,255,.18), transparent 60%),
        radial-gradient(400px 200px at 110% -40%, rgba(110,168,255,.18), transparent 60%);
    }

    .badge{
      flex:0 0 auto;
      width:56px;height:56px;
      border-radius:14px;
      display:grid;place-items:center;
      font-weight:800;
      letter-spacing:.5px;
      background:
        conic-gradient(from -40deg, var(--accent), var(--accent-2), var(--accent));
      color:white;
      box-shadow:0 8px 24px rgba(110,168,255,.35), inset 0 0 18px rgba(255,255,255,.2);
      border:1px solid rgba(255,255,255,.28);
      text-shadow:0 1px 0 rgba(0,0,0,.35);
    }
    .badge span{ font-size:22px; }

    .wordmark{
      line-height:1.05;
      font-weight:900;
      letter-spacing:0.4px;
    }
    .wordmark .line1{
      font-size:15px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.6px;
    }
    .wordmark .line2{
      font-size:26px;
      background:linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 60%, #a889ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:0 0 0 rgba(0,0,0,0);
    }

    .body{
      padding:24px 28px 28px;
    }

    .hint{
      color:var(--muted);
      font-size:14px;
      margin:0 0 18px 0;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin:12px 0;
    }
    .label{
      color:var(--muted);
      font-size:13px;
      letter-spacing:.3px;
    }
    .input{
      background:#0c1018;
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
      padding:12px 14px;
      border-radius:12px;
      outline:none;
      transition:.18s border-color ease,.18s box-shadow ease;
    }
    .input:focus{
      border-color:rgba(110,168,255,.65);
      box-shadow:0 0 0 4px rgba(110,168,255,.15);
    }

    .actions{
      margin-top:18px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .btn{
      appearance:none;
      border:0;
      cursor:pointer;
      padding:12px 16px;
      border-radius:12px;
      font-weight:700;
      letter-spacing:.3px;
      background:linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
      color:white;
      box-shadow:0 10px 22px rgba(110,168,255,.25);
      transition:transform .08s ease, filter .18s ease;
    }
    .btn:active{ transform:translateY(1px); }
    .ghost{
      background:transparent;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.12);
    }

    .footer{
      padding:14px 20px 20px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
      border-top:1px solid rgba(255,255,255,.06);
    }
  </style>
</head>
<body>
  <main class="wrap" aria-label="Login">
    <section class="card" role="region" aria-labelledby="brand-title">
      <header class="brand">
        <div class="badge" aria-hidden="true"><span>HD</span></div>
        <div class="wordmark">
          <div id="brand-title" class="line1">Hotel‑Dashboard</div>
          <div class="line2">Login</div>
        </div>
      </header>

      <div class="body">
        <p class="hint">Bitte melde dich mit deinen Zugangsdaten an.</p>

        <form action="/login" method="post" autocomplete="off">
          <div class="field">
            <label class="label" for="username">Benutzername</label>
            <input class="input" id="username" name="username" type="text" required>
          </div>

          <div class="field">
            <label class="label" for="password">Passwort</label>
            <input class="input" id="password" name="password" type="password" required>
          </div>

          <div class="actions">
            <button class="btn" type="submit">Anmelden</button>
            <button class="btn ghost" type="reset">Zurücksetzen</button>
          </div>
        </form>
      </div>

      <div class="footer">
        © <span id="year"></span> Hotel‑Dashboard · Alle Rechte vorbehalten
      </div>
    </section>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
